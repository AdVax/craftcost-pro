<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#7C3AED"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CraftCost Pro"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<link rel="icon" href="icon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<title>CraftCost Pro</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090F;--surf:#0E0E1C;--card:#111124;--c2:#181830;
  --bd:#1C1C3A;--bd2:#272750;
  --p:#7C3AED;--p2:#9D60FF;--pBg:rgba(124,58,237,.13);--pBd:rgba(124,58,237,.28);
  --gold:#F59E0B;--gBg:rgba(245,158,11,.13);--gBd:rgba(245,158,11,.28);
  --ok:#10B981;--oBg:rgba(16,185,129,.13);--oBd:rgba(16,185,129,.28);
  --err:#EF4444;--eBg:rgba(239,68,68,.13);--eBd:rgba(239,68,68,.28);
  --warn:#F59E0B;--wBg:rgba(245,158,11,.13);--wBd:rgba(245,158,11,.28);
  --info:#3B82F6;--iBg:rgba(59,130,246,.13);--iBd:rgba(59,130,246,.28);
  --tx:#E4E4F0;--sub:#7878A8;--mut:#4C4C7A;
}
html,body{height:100%;overflow:hidden;font-family:'Cairo',sans-serif;direction:rtl;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
#root{height:100%}
input,select,textarea,button{font-family:'Cairo',sans-serif}
input,select,textarea{background:var(--surf);border:1.5px solid var(--bd2);color:var(--tx);padding:10px 14px;border-radius:10px;width:100%;outline:none;transition:border-color .2s;direction:rtl;font-size:16px}
input:focus,select:focus,textarea:focus{border-color:var(--p2);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
select option{background:var(--c2)}
button{cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;border:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:228px;flex-shrink:0;background:var(--surf);border-left:1.5px solid var(--bd);display:flex;flex-direction:column;padding:14px 10px;z-index:300}
.mob-sb{position:fixed;right:0;top:0;bottom:0;height:100%;transition:transform .3s}
.mob-sb.off{transform:translateX(110%)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:299;animation:fi .2s}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:12px 16px;border-bottom:1.5px solid var(--bd);background:var(--surf);display:flex;align-items:center;gap:10px;flex-shrink:0}
.page{flex:1;overflow-y:auto;padding:20px 16px 80px}

/* Nav */
.ni{display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:11px;width:100%;text-align:right;font-size:13px;font-weight:600;color:var(--sub);background:transparent;margin-bottom:2px;transition:all .2s}
.ni:hover{background:rgba(255,255,255,.04);color:var(--tx)}
.ni.on{background:var(--pBg);color:var(--p2);border:1px solid var(--pBd)}
.nbadge{margin-right:auto;background:var(--err);color:#fff;border-radius:99px;font-size:10px;padding:1px 7px;font-weight:800}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;transition:all .2s;white-space:nowrap}
.bp{background:linear-gradient(135deg,#7C3AED,#9D60FF);color:#fff;box-shadow:0 2px 12px rgba(124,58,237,.3)}
.bp:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(124,58,237,.45)}
.bp:active{transform:translateY(0)}
.bp:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.bo{background:transparent;border:1.5px solid var(--bd2);color:var(--tx)}
.bo:hover{border-color:var(--p2);color:var(--p2)}
.br{background:var(--eBg);border:1px solid var(--eBd);color:var(--err)}
.bg{background:var(--oBg);border:1px solid var(--oBd);color:var(--ok)}
.bw{background:var(--wBg);border:1px solid var(--wBd);color:var(--warn)}
.bsm{padding:6px 12px;font-size:12px;border-radius:8px}
.bxs{padding:4px 9px;font-size:11px;border-radius:7px}
.bfl{width:100%;justify-content:center}

/* Cards */
.card{background:var(--card);border:1.5px solid var(--bd);border-radius:14px;transition:all .25s}
.cardh:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,.35)}

/* Badges */
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.bdg-p{background:var(--pBg);color:var(--p2)}
.bdg-ok{background:var(--oBg);color:var(--ok)}
.bdg-err{background:var(--eBg);color:var(--err)}
.bdg-warn{background:var(--wBg);color:var(--warn)}
.bdg-mute{background:rgba(255,255,255,.07);color:var(--sub)}
.bdg-gold{background:var(--gBg);color:var(--gold)}

/* Form */
.lbl{display:block;margin-bottom:5px;font-size:12px;font-weight:700;color:var(--sub)}
.hint{font-size:11px;color:var(--mut);margin-top:4px}
.sec{background:var(--card);border:1.5px solid var(--bd);border-radius:14px;padding:20px;margin-bottom:14px}
.hr{border:none;border-top:1px solid var(--bd);margin:16px 0}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}

/* Modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(16px);padding:12px}
.mdl{background:var(--card);border:1.5px solid var(--bd2);border-radius:20px;padding:24px;width:100%;max-width:540px;max-height:93vh;overflow-y:auto;animation:su .3s}
.mdl.wide{max-width:640px}

/* Toast */
.tz{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:7px;align-items:center;pointer-events:none}
.toast{padding:11px 22px;border-radius:12px;font-weight:800;font-size:13px;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.6);color:#fff;animation:su .3s}

/* Install */
.install{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:9990;width:min(94vw,395px);background:linear-gradient(135deg,#131328,#1C1C38);border:1.5px solid var(--pBd);border-radius:18px;padding:13px 15px;box-shadow:0 16px 56px rgba(0,0,0,.75);display:flex;align-items:center;gap:12px;animation:su .4s}

/* Login */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:18px}
.login-box{background:var(--card);border:1.5px solid var(--bd2);border-radius:24px;padding:36px 28px;width:100%;max-width:400px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.5)}

/* Progress */
.prog{background:var(--bd);border-radius:99px;height:6px;overflow:hidden}
.progb{height:100%;border-radius:99px;transition:width .5s}

/* Table */
.tw{overflow-x:auto;border-radius:14px;border:1.5px solid var(--bd)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 13px;text-align:right;color:var(--sub);font-weight:700;border-bottom:1.5px solid var(--bd);white-space:nowrap;background:var(--c2)}
td{padding:10px 13px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.025)}

/* Stat */
.stat{background:var(--card);border:1.5px solid var(--bd);border-radius:14px;padding:16px;cursor:pointer;transition:all .25s}
.stat:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}

@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.fu{animation:su .32s}

@media(max-width:620px){.g2,.g3{grid-template-columns:1fr}.ga{grid-template-columns:1fr}}
@media(display-mode:standalone){.topbar{padding-top:calc(12px + env(safe-area-inset-top))!important}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script>
'use strict';
const {useState,useEffect,useMemo,useCallback,Fragment}=React;
const h=React.createElement;

/* ══════════════════════════════
   CONFIG — أضف بياناتك هنا
══════════════════════════════ */
const CFG={
  APP: 'CraftCost Pro',
  SUB: 'إدارة تكاليف الهاند ميد بذكاء',
  CO:  'AdVax',
  VER: '3.1',
};

/* ══════════════════════════════
   Static data
══════════════════════════════ */
const MC  =['زيوت وشموع','عطور','زهور','تغليف','أقمشة','خيوط','طعام','كيماويات','أخرى'];
const RC  =['مستحضرات تجميل','باقات ورد','عطور','شموع','مجوهرات','ملابس','طعام','هدايا','أخرى'];
const PLAT=['إنستغرام','واتساب','تيك توك','سناب','متجر إلكتروني','معرض','صديق','أخرى'];
const UN  =['غ','مل','كغ','لتر','قطعة','متر','ملعقة ص','ملعقة ك'];
const CUR =[{c:'SAR',s:'ر.س'},{c:'AED',s:'د.إ'},{c:'KWD',s:'د.ك'},{c:'SYP',s:'ل.س'},{c:'USD',s:'$'},{c:'EUR',s:'€'}];

/* ══════════════════════════════
   Helpers
══════════════════════════════ */
const uid=()=>Math.random().toString(36).slice(2,9);
const fmt=(n,c='SAR')=>`${(+n||0).toFixed(2)} ${c}`;
const pct=n=>`${(+n||0).toFixed(1)}%`;
const today=()=>new Date().toISOString().slice(0,10);
const isMob=()=>window.innerWidth<860;

function useLS(k,d0){
  const[v,sv]=useState(()=>{try{const s=localStorage.getItem(k);return s?JSON.parse(s):d0}catch{return d0}});
  useEffect(()=>{localStorage.setItem(k,JSON.stringify(v))},[v,k]);
  return[v,sv];
}

/* ══════════════════════════════
   🔔 GitHub Notification Checker
══════════════════════════════ */


/* ══════════════════════════════
   Supabase
══════════════════════════════ */
/* ══════════════════════════════
   Notifications
══════════════════════════════ */
/* ══════════════════════════════
   Business Logic
══════════════════════════════ */
const matStock=m=>{
  const b=(m.purchases||[]).reduce((s,p)=>s+p.qty,0);
  return Math.max(0,b-(m.usedQty||0));
};
const unitCost=m=>{
  const p=m.purchases||[];
  if(!p.length)return 0;
  const l=p[p.length-1];
  return l.totalPrice/l.qty;
};
function calcRec(r,mats,cfg){
  const ings=(r.ingredients||[]).map(i=>{
    const m=mats.find(x=>x.id===i.matId);
    if(!m)return{...i,cost:0,effQty:i.qty,unitLabel:i.unit||'وحدة'};
    const uc=unitCost(m);
    const effQty=i.qty*(1+(m.wastePercent||0)/100);
    return{...i,name:m.name,unitLabel:m.unit,cost:uc*effQty,effQty};
  });
  const ingTotal=ings.reduce((s,i)=>s+i.cost,0);
  const packCost=r.packagingCost||0;
  const shipCost=r.shippingCost||0;
  const timeCost=(r.timeHours||0)*(cfg.hourlyRate||0);
  const bs=Math.max(1,r.batchSize||1);
  const total=ingTotal+packCost+shipCost+timeCost;
  const cpu=total/bs;
  const sp=r.sellingPrice||0;
  const margin=sp>0?((sp-cpu)/sp)*100:null;
  const suggest=t=>t>=100?0:cpu/(1-t/100);
  return{ings,ingTotal,packCost,shipCost,timeCost,total,cpu,margin,suggest};
}

/* ══════════════════════════════
   UI: Toast
══════════════════════════════ */
function useToast(){
  const[list,set]=useState([]);
  const show=useCallback((msg,type='ok')=>{
    const id=uid();set(p=>[...p,{id,msg,type}]);
    setTimeout(()=>set(p=>p.filter(t=>t.id!==id)),3500);
  },[]);
  return{list,show};
}
function Toasts({list}){
  if(!list||!list.length)return null;
  const C={ok:'#10B981',err:'#EF4444',warn:'#F59E0B',info:'#3B82F6'};
  return h('div',{style:{position:'fixed',bottom:20,left:'50%',transform:'translateX(-50%)',display:'flex',flexDirection:'column',gap:8,zIndex:9999,pointerEvents:'none',alignItems:'center'}},
    list.map(t=>h('div',{key:t.id,className:'toast',style:{background:C[t.type]||C.ok}},t.msg))
  );
}

/* ══════════════════════════════
   📢 In-App Notification Banner
══════════════════════════════ */
/* ══════════════════════════════
   Dashboard
══════════════════════════════ */
function Dashboard({mats,recs,sales,waste,cfg,setPage}){
  const cur=cfg.currency||'SAR';
  const mo=new Date().toISOString().slice(0,7);
  const mSales=sales.filter(s=>s.date.startsWith(mo));
  const rev=mSales.reduce((s,x)=>s+(x.price||0)*x.qty,0);
  const cogs=mSales.reduce((s,x)=>{const r=recs.find(y=>y.id===x.recipeId);return r?s+calcRec(r,mats,cfg).cpu*x.qty:s},0);
  const profit=rev-cogs;
  const units=mSales.reduce((s,x)=>s+x.qty,0);
  const mWaste=waste.filter(w=>w.date.startsWith(mo));
  const wVal=mWaste.reduce((s,w)=>{const m=mats.find(x=>x.id===w.matId);return s+(m?unitCost(m)*w.qty:0)},0);
  const lowStock=mats.filter(m=>m.minStock>0&&matStock(m)<=m.minStock);

  // Top product
  const pm={};
  mSales.forEach(s=>{
    const r=recs.find(x=>x.id===s.recipeId);if(!r)return;
    const rv=(s.price||0)*s.qty,c=calcRec(r,mats,cfg).cpu*s.qty;
    if(!pm[r.id])pm[r.id]={name:r.name,rev:0,profit:0,qty:0};
    pm[r.id].rev+=rv;pm[r.id].profit+=rv-c;pm[r.id].qty+=s.qty;
  });
  const topP=Object.values(pm).sort((a,b)=>b.profit-a.profit)[0];

  const stats=[
    {ic:'💰',l:'إيرادات الشهر',v:fmt(rev,cur),c:'#10B981',s:`${units} قطعة مباعة`,pg:'sales'},
    {ic:'📈',l:'الربح الصافي',v:fmt(profit,cur),c:profit>=0?'#10B981':'#EF4444',s:rev>0?`هامش ${pct(profit/rev*100)}`:'—',pg:'reports'},
    {ic:'♻️',l:'خسائر الهدر',v:fmt(wVal,cur),c:wVal>0?'#F59E0B':'#10B981',s:`${mWaste.length} حادثة`,pg:'waste'},
    {ic:'⚠️',l:'تنبيهات مخزون',v:lowStock.length+' مادة',c:lowStock.length>0?'#EF4444':'#10B981',s:lowStock.length>0?'تحتاج تجديد':'كل شيء بخير',pg:'inventory'},
  ];

  return h('div',{className:'fu'},
    h('div',{style:{marginBottom:20}},
      h('h1',{style:{fontSize:22,fontWeight:900,marginBottom:4}},
        cfg.businessName?`مرحباً، ${cfg.businessName} 👋`:'لوحة التحكم 📊'
      ),
      h('p',{style:{color:'#7878A8',fontSize:13}},
        new Date().toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'})
      )
    ),

    // KPIs
    h('div',{className:'ga',style:{marginBottom:18}},
      stats.map((s,i)=>h('div',{key:i,className:'stat',onClick:()=>setPage(s.pg)},
        h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:12}},
          h('div',{style:{width:42,height:42,borderRadius:11,background:s.c+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}},s.ic),
          h('span',{style:{color:'#4C4C7A',fontSize:14}})
        ),
        h('div',{style:{fontSize:20,fontWeight:900,color:s.c,marginBottom:3}},s.v),
        h('div',{style:{fontSize:13,color:'#7878A8',marginBottom:2}},s.l),
        h('div',{style:{fontSize:11,color:'#4C4C7A'}},s.s)
      ))
    ),

    // Best product
    topP&&h('div',{style:{background:'rgba(124,58,237,.08)',border:'1px solid rgba(124,58,237,.22)',borderRadius:14,padding:'13px 16px',marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',null,
        h('div',{style:{fontSize:12,color:'#7878A8',marginBottom:3}},'🏆 أكثر منتج مربح هذا الشهر'),
        h('div',{style:{fontSize:16,fontWeight:800,color:'#9D60FF'}},topP.name)
      ),
      h('div',{style:{textAlign:'left'}},
        h('div',{style:{fontSize:15,fontWeight:900,color:'#10B981'}},fmt(topP.profit,cur)),
        h('div',{style:{fontSize:11,color:'#7878A8'}},topP.qty,' قطعة')
      )
    ),

    // Low stock alert
    lowStock.length>0&&h('div',{style:{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.25)',borderRadius:14,padding:14,marginBottom:14}},
      h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:8}},
        h('div',{style:{fontWeight:800,fontSize:14,color:'#EF4444'}},'⚠️ مواد على وشك النفاد'),
        h('button',{onClick:()=>setPage('inventory'),style:{background:'none',border:'none',color:'#EF4444',fontSize:12,fontWeight:700,cursor:'pointer'}},'إدارة المخزون ←')
      ),
      lowStock.map(m=>h('div',{key:m.id,style:{display:'flex',justifyContent:'space-between',fontSize:13,padding:'4px 0',borderBottom:'1px solid rgba(239,68,68,.1)'}},
        h('span',{style:{fontWeight:600}},m.name),
        h('span',{style:{color:'#EF4444',fontWeight:700}},matStock(m).toFixed(1),' ',m.unit,' متبقي')
      ))
    ),

    // Recent data
    h('div',{className:'g2'},
      h('div',{className:'sec',style:{margin:0}},
        h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:11}},
          h('h3',{style:{fontSize:14,fontWeight:800}},'🛍️ آخر المبيعات'),
          h('button',{onClick:()=>setPage('sales'),style:{background:'none',border:'none',color:'#9D60FF',fontSize:12,fontWeight:700,cursor:'pointer'}},'الكل ←')
        ),
        sales.length===0
          ?h('div',{style:{textAlign:'center',padding:'18px 0',color:'#4C4C7A'}},h('div',{style:{fontSize:28,marginBottom:6}},'🛍️'),h('p',{style:{fontSize:13}},'لا توجد مبيعات بعد'))
          :sales.slice(-5).reverse().map(s=>{
              const r=recs.find(x=>x.id===s.recipeId);
              return h('div',{key:s.id,style:{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #1C1C3A'}},
                h('div',null,h('div',{style:{fontSize:13,fontWeight:600}},r?.name||'—'),h('div',{style:{fontSize:11,color:'#7878A8'}},s.date,' · ',s.platform||'—')),
                h('span',{style:{color:'#10B981',fontWeight:700,fontSize:13}},fmt((s.price||0)*s.qty,cur))
              );
            })
      ),
      h('div',{className:'sec',style:{margin:0}},
        h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:11}},
          h('h3',{style:{fontSize:14,fontWeight:800}},'📖 المنتجات'),
          h('button',{onClick:()=>setPage('recipes'),style:{background:'none',border:'none',color:'#9D60FF',fontSize:12,fontWeight:700,cursor:'pointer'}},'الكل ←')
        ),
        recs.length===0
          ?h('div',{style:{textAlign:'center',padding:'18px 0',color:'#4C4C7A'}},h('div',{style:{fontSize:28,marginBottom:6}},'📖'),h('p',{style:{fontSize:13}},'لا توجد وصفات بعد'))
          :recs.slice(0,5).map(r=>{
              const{cpu,margin}=calcRec(r,mats,cfg);
              return h('div',{key:r.id,style:{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #1C1C3A'}},
                h('span',{style:{fontSize:13,fontWeight:600}},r.name),
                h('div',{style:{textAlign:'left'}},
                  h('div',{style:{fontSize:12,color:'#F59E0B',fontWeight:700}},fmt(cpu,cur)),
                  margin!==null&&h('div',{style:{fontSize:11,color:margin>30?'#10B981':'#EF4444'}},pct(margin),' ربح')
                )
              );
            })
      )
    ),

    // Guide
    mats.length===0&&h('div',{style:{background:'rgba(124,58,237,.1)',border:'1.5px dashed rgba(124,58,237,.3)',borderRadius:14,padding:18,marginTop:16,display:'flex',gap:12}},
      h('div',{style:{fontSize:24,marginTop:2}},'🚀'),
      h('div',null,
        h('div',{style:{fontWeight:800,color:'#9D60FF',fontSize:15,marginBottom:8}},'ابدأ الآن في 3 خطوات'),

/* ══════════════════════════════
   Reports
══════════════════════════════ */
function Reports({sales,recs,mats,waste,cfg}){
  const[per,setPer]=useState('month');
  const cur=cfg.currency||'SAR';
  const now=new Date();
  const getMonthKey=(offset=0)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-offset,1);
    return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  };
  const filter=d=>{
    if(per==='today')return d===today();
    if(per==='week'){const w=new Date(now);w.setDate(w.getDate()-7);return new Date(d)>=w}
    if(per==='month')return d.startsWith(getMonthKey(0));
    if(per==='year')return d.startsWith(`${now.getFullYear()}`);
    return true;
  };
  const ps=sales.filter(s=>filter(s.date));
  const pw=waste.filter(w=>filter(w.date));
  const rev=ps.reduce((s,x)=>s+(x.price||0)*x.qty,0);
  const cogs=ps.reduce((s,x)=>{const r=recs.find(y=>y.id===x.recipeId);return r?s+calcRec(r,mats,cfg).cpu*x.qty:s},0);
  const wv=pw.reduce((s,w)=>{const m=mats.find(x=>x.id===w.matId);return s+(m?unitCost(m)*w.qty:0)},0);
  const profit=rev-cogs-wv;
  const margin=rev>0?(profit/rev)*100:0;
  // Product breakdown
  const pb={};
  ps.forEach(s=>{
    const r=recs.find(x=>x.id===s.recipeId);if(!r)return;
    const rv=(s.price||0)*s.qty,c=calcRec(r,mats,cfg).cpu*s.qty;
    if(!pb[r.id])pb[r.id]={name:r.name,qty:0,rev:0,cost:0};
    pb[r.id].qty+=s.qty;pb[r.id].rev+=rv;pb[r.id].cost+=c;
  });
  const pl=Object.values(pb).sort((a,b)=>b.rev-a.rev);
  // Monthly comparison (last 3)
  const months=[0,1,2].map(i=>{
    const key=getMonthKey(i);
    const label=new Date(now.getFullYear(),now.getMonth()-i,1).toLocaleDateString('ar-SA',{month:'long',year:'numeric'});
    const ms=sales.filter(s=>s.date.startsWith(key));
    const mr=ms.reduce((s,x)=>s+(x.price||0)*x.qty,0);
    const mc=ms.reduce((s,x)=>{const r=recs.find(y=>y.id===x.recipeId);return r?s+calcRec(r,mats,cfg).cpu*x.qty:s},0);
    return{label,rev:mr,profit:mr-mc,qty:ms.reduce((s,x)=>s+x.qty,0)};
  });
  const maxR=Math.max(...months.map(m=>m.rev),1);
  const periods=[{v:'today',l:'اليوم'},{v:'week',l:'أسبوع'},{v:'month',l:'شهر'},{v:'year',l:'سنة'},{v:'all',l:'الكل'}];
  return h('div',{className:'fu'},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18,flexWrap:'wrap',gap:10}},
      h('h1',{style:{fontSize:21,fontWeight:900}},'📊 التقارير'),
      h('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
        periods.map(p=>h('button',{key:p.v,onClick:()=>setPer(p.v),className:'btn bsm '+(per===p.v?'bp':'bo')},p.l))
      )
    ),
    // KPIs
    h('div',{className:'ga',style:{marginBottom:18}},
      [
        {ic:'💰',l:'الإيرادات',v:fmt(rev,cur),c:'#10B981'},
        {ic:'📦',l:'تكلفة البضاعة',v:fmt(cogs,cur),c:'#EF4444'},
        {ic:'♻️',l:'خسائر الهدر',v:fmt(wv,cur),c:'#F59E0B'},
        {ic:'📈',l:'الربح الصافي',v:fmt(profit,cur),c:profit>=0?'#10B981':'#EF4444'},
        {ic:'🎯',l:'هامش الربح',v:pct(margin),c:margin>40?'#10B981':margin>20?'#F59E0B':'#EF4444'},
        {ic:'🛍️',l:'المبيعات',v:ps.reduce((s,x)=>s+x.qty,0)+' قطعة',c:'#9D60FF'},
      ].map((s,i)=>h('div',{key:i,className:'stat'},h('div',{style:{fontSize:22,marginBottom:8}},s.ic),h('div',{style:{fontSize:18,fontWeight:900,color:s.c,marginBottom:3}},s.v),h('div',{style:{fontSize:12,color:'#7878A8'}},s.l)))
    ),
    // Monthly comparison bars
    h('div',{className:'sec'},
      h('h3',{style:{fontSize:15,fontWeight:800,marginBottom:14}},'📅 مقارنة الأشهر الثلاثة الأخيرة'),
      h('div',{style:{display:'flex',gap:16,alignItems:'flex-end',height:130}},
        months.map((m,i)=>h('div',{key:i,style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:5}},
          h('div',{style:{fontSize:11,color:'#10B981',fontWeight:700}},fmt(m.profit,cur)),
          h('div',{style:{width:'100%',display:'flex',gap:4,alignItems:'flex-end',height:80}},
            h('div',{style:{flex:1,borderRadius:'4px 4px 0 0',background:'#9D60FF',height:Math.max(4,(m.rev/maxR)*100)+'%',transition:'height .5s'}}),
            h('div',{style:{flex:1,borderRadius:'4px 4px 0 0',background:'#10B981',height:Math.max(m.profit>0?4:0,(m.profit/maxR)*100)+'%',transition:'height .5s'}})
          ),
          h('div',{style:{fontSize:10,color:'#7878A8',textAlign:'center',lineHeight:1.4}},m.label),
          h('div',{style:{fontSize:10,color:'#4C4C7A'}},m.qty,' قطعة'),
          i===0&&h('span',{className:'bdg bdg-p',style:{fontSize:9}},'الحالي')
        )),
        h('div',{style:{display:'flex',flexDirection:'column',gap:5,marginBottom:26,flexShrink:0}},
          h('div',{style:{display:'flex',alignItems:'center',gap:5}},h('div',{style:{width:10,height:10,borderRadius:2,background:'#9D60FF'}}),h('span',{style:{fontSize:11,color:'#7878A8'}},'إيرادات')),
          h('div',{style:{display:'flex',alignItems:'center',gap:5}},h('div',{style:{width:10,height:10,borderRadius:2,background:'#10B981'}}),h('span',{style:{fontSize:11,color:'#7878A8'}},'ربح'))
        )
      )
    ),
    // Product table
    pl.length>0&&h('div',{className:'sec'},
      h('h3',{style:{fontSize:15,fontWeight:800,marginBottom:12}},'🏆 أداء المنتجات'),
      h('div',{className:'tw'},h('table',null,
        h('thead',null,h('tr',null,h('th',null,'المنتج'),h('th',null,'الكمية'),h('th',null,'الإيرادات'),h('th',null,'التكلفة'),h('th',null,'الربح'),h('th',null,'الهامش'))),
        h('tbody',null,pl.map(p=>{
          const pr=p.rev-p.cost,mg=p.rev>0?(pr/p.rev)*100:0;
          return h('tr',{key:p.name},
            h('td',null,h('b',null,p.name)),h('td',null,p.qty,' قطعة'),
            h('td',null,fmt(p.rev,cur)),h('td',null,fmt(p.cost,cur)),
            h('td',null,h('b',{style:{color:pr>=0?'#10B981':'#EF4444'}},fmt(pr,cur))),
            h('td',null,h('b',{style:{color:mg>40?'#10B981':mg>20?'#F59E0B':'#EF4444'}},pct(mg)))
          );
        }))
      ))
    ),
    !ps.length&&h('div',{style:{textAlign:'center',padding:'40px 0',color:'#4C4C7A'}},h('div',{style:{fontSize:42,marginBottom:12}},'📊'),h('p',{style:{fontSize:14}},'لا توجد بيانات للفترة المختارة'))
  );
}

function Settings({cfg,setCfg,mats,setMats,recs,setRecs,sales,setSales,waste,setWaste,showToast}){
  const[hr,setHr]=useState(cfg.hourlyRate||0);
  const[bn,setBn]=useState(cfg.businessName||'');

  const saveS=()=>{setCfg(p=>({...p,hourlyRate:parseFloat(hr)||0,businessName:bn.trim()}));showToast('✓ تم الحفظ')};
  const doExp=()=>{
    const d=JSON.stringify({mats,recs,sales,waste,cfg,v:CFG.VER,at:Date.now()},null,2);
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([d],{type:'application/json'}));
    a.download=`craftcost-backup-${today()}.json`;a.click();
    showToast('✓ تم التصدير');
  };
  const doImp=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.mats)setMats(d.mats);if(d.recs)setRecs(d.recs);if(d.sales)setSales(d.sales);if(d.waste)setWaste(d.waste);if(d.cfg)setCfg(d.cfg);showToast('✓ تم الاستيراد')}catch{showToast('خطأ في الملف','err')}};
    r.readAsText(f);e.target.value='';
  };
  const doReset=()=>{if(window.confirm('⚠️ مسح كل البيانات؟ لا يمكن التراجع!')){setMats([]);setRecs([]);setSales([]);setWaste([]);showToast('تم المسح','err')}};
  const daysLeft=0;
  return h('div',{className:'fu',style:{maxWidth:560}},
    h('h1',{style:{fontSize:21,fontWeight:900,marginBottom:18}},'⚙️ الإعدادات'),
    // Business
    h('div',{className:'sec'},
      h('h3',{style:{fontSize:14,fontWeight:800,marginBottom:12}},'💼 إعدادات العمل'),
      h('div',{style:{marginBottom:12}},h('label',{className:'lbl'},'اسم النشاط التجاري'),h('input',{value:bn,onChange:e=>setBn(e.target.value),placeholder:'ورشة الإبداع'})),
      h('div',{style:{marginBottom:14}},h('label',{className:'lbl'},'سعر ساعة العمل (',cfg.currency||'SAR',')'),h('input',{type:'number',value:hr,onChange:e=>setHr(e.target.value),placeholder:'0',min:0,step:0.5}),h('p',{className:'hint'},'يُحتسب في تكلفة الوقت بالوصفات')),
      h('button',{className:'btn bp',onClick:saveS},'✓ حفظ الإعدادات')
    ),
    // Currency
    h('div',{className:'sec'},
      h('h3',{style:{fontSize:14,fontWeight:800,marginBottom:10}},'💰 العملة'),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(88px,1fr))',gap:8}},
        CUR.map(c=>h('button',{key:c.c,onClick:()=>{setCfg(p=>({...p,currency:c.c}));showToast('✓ '+c.c)},style:{padding:'10px 6px',borderRadius:10,textAlign:'center',fontFamily:'Cairo,sans-serif',transition:'all .2s',border:`2px solid ${cfg.currency===c.c?'#9D60FF':'#272750'}`,background:cfg.currency===c.c?'rgba(124,58,237,.13)':'#181830',color:cfg.currency===c.c?'#9D60FF':'#E4E4F0',cursor:'pointer'}},
          h('div',{style:{fontSize:16,fontWeight:900}},c.s),
          h('div',{style:{fontSize:11,fontWeight:700,marginTop:2}},c.c)
        ))
      )
    ),
    // Data
    h('div',{className:'sec'},
      h('h3',{style:{fontSize:14,fontWeight:800,marginBottom:4}},'💾 البيانات'),
      h('p',{style:{fontSize:12,color:'#7878A8',marginBottom:10}},'صدّر نسخة احتياطية بانتظام لحماية بياناتك'),
      h('div',{style:{background:'#181830',borderRadius:9,padding:'8px 13px',marginBottom:12,display:'flex',justifyContent:'space-around',fontSize:12}},
        h('span',null,'مواد: ',h('b',null,mats.length)),
        h('span',null,'وصفات: ',h('b',null,recs.length)),
        h('span',null,'مبيعات: ',h('b',null,sales.length)),
        h('span',null,'هدر: ',h('b',null,waste.length))
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:9}},
        h('button',{className:'btn bo',style:{justifyContent:'flex-start',gap:10,width:'100%'},onClick:doExp},'⬇ تصدير كل البيانات (JSON)'),
        h('label',{style:{cursor:'pointer'}},
          h('div',{className:'btn bo',style:{justifyContent:'flex-start',gap:10,width:'100%',display:'flex'}},'⬆ استيراد بيانات (JSON)'),
          h('input',{type:'file',accept:'.json',onChange:doImp,style:{display:'none'}})
        ),
        h('button',{className:'btn br',style:{justifyContent:'flex-start',gap:10,width:'100%'},onClick:doReset},'🗑 مسح جميع البيانات')
      )
    ),
    h('div',{style:{textAlign:'center',fontSize:11,color:'#4C4C7A',marginTop:14,lineHeight:2}},
      h('b',{style:{color:'#9D60FF',fontSize:13}},'CraftCost Pro v',CFG.VER),h('br'),
      'by ',CFG.CO,' © ',new Date().getFullYear()
    )
  );

    h(Toasts,{list:toasts}),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>

<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<title>لوحة إدارة AdVax</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;direction:rtl;background:#07060F;color:#E0DEF0;min-height:100vh}
input,select,textarea,button{font-family:'Cairo',sans-serif}
input,select,textarea{background:#100F1E;border:1.5px solid #21203A;color:#E0DEF0;padding:9px 12px;border-radius:8px;width:100%;outline:none;transition:border-color .15s;direction:rtl;font-size:14px}
input:focus,select:focus,textarea:focus{border-color:#7C3AED}
select option{background:#161528}
button{cursor:pointer;border:none;font-family:'Cairo',sans-serif;transition:all .15s}
button:active{transform:scale(.96)}
button:disabled{opacity:.4;cursor:not-allowed;transform:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#21203A;border-radius:3px}

#bar{background:#090817;border-bottom:1px solid #161528;padding:12px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:99}
.blogo{width:34px;height:34px;border-radius:9px;flex-shrink:0;background:linear-gradient(135deg,#7C3AED,#A78BFA);display:flex;align-items:center;justify-content:center;font-size:17px}
#wrap{max-width:980px;margin:0 auto;padding:18px 14px 60px}

.tabs{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:700;color:#3E3C6A;background:#100F1E;border:1px solid #161528;cursor:pointer}
.tab.on{background:rgba(124,58,237,.18);color:#A78BFA;border-color:rgba(124,58,237,.4)}

.card{background:#100F1E;border:1px solid #161528;border-radius:11px;padding:16px;margin-bottom:12px}
.ch{font-size:14px;font-weight:800;color:#C4B5FD;margin-bottom:13px}

.b{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.b:disabled{opacity:.4;cursor:not-allowed}
.bp{background:linear-gradient(135deg,#7C3AED,#A78BFA);color:#fff}
.bo{background:transparent;border:1px solid #21203A;color:#C0BDDF}
.bo:hover:not(:disabled){border-color:#7C3AED;color:#A78BFA}
.br{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);color:#EF4444}
.bg2{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.28);color:#10B981}
.by{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.28);color:#F59E0B}
.blg{padding:10px 22px;font-size:14px;border-radius:9px}

.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
@media(max-width:600px){.g3,.g4{grid-template-columns:1fr}}

.sv{background:#100F1E;border:1px solid #161528;border-radius:10px;padding:12px}
.sn{font-size:24px;font-weight:900;line-height:1}
.sl{font-size:11px;color:#3E3C6A;margin-top:4px}

.tw{overflow-x:auto;border-radius:9px;border:1px solid #161528}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:640px}
th{padding:8px 11px;text-align:right;color:#3E3C6A;font-weight:700;background:#090817;border-bottom:1px solid #161528;white-space:nowrap}
td{padding:9px 11px;border-bottom:1px solid #0F0E1C;vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:rgba(124,58,237,.03)}
tr.dim td{opacity:.38}

.bg{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.bgg{background:rgba(16,185,129,.12);color:#10B981;border:1px solid rgba(16,185,129,.2)}
.bgr{background:rgba(239,68,68,.12);color:#EF4444;border:1px solid rgba(239,68,68,.2)}
.bgy{background:rgba(245,158,11,.12);color:#F59E0B;border:1px solid rgba(245,158,11,.2)}
.bgp{background:rgba(124,58,237,.12);color:#A78BFA;border:1px solid rgba(124,58,237,.2)}
.bgd{background:rgba(255,255,255,.05);color:#3E3C6A;border:1px solid rgba(255,255,255,.07)}

.lb{display:block;margin-bottom:4px;font-size:11px;font-weight:700;color:#3E3C6A}

.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:9px;font-weight:700;font-size:13px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.7);white-space:nowrap;color:#fff;pointer-events:none;animation:tin .2s ease-out}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(7px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.lp{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 70% 50% at 50% 20%,rgba(124,58,237,.1),transparent)}
.lc{background:#100F1E;border:1px solid #21203A;border-radius:18px;padding:30px 24px;width:100%;max-width:360px;text-align:center}
.ll{width:58px;height:58px;border-radius:14px;background:linear-gradient(135deg,#7C3AED,#A78BFA);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script>
'use strict';

/* ══════════════════ CONFIG ══════════════════ */
var SUPA  = 'https://jqkmtqbhxsuvvumudgrj.supabase.co';
var AKEY  = 'sb_publishable_0KbQ1aL7rWoJCkk84OUVKQ_Krc4nvwS';
var APP   = 'https://craftcost-pro.advax.workers.dev';
var GHAPI = 'https://api.github.com/repos/Advax/craftcost-notification/contents/latest.json';

/* ══════════════════ REACT ══════════════════ */
var h  = React.createElement;
var Fr = React.Fragment;
var St = React.useState;
var Ef = React.useEffect;
var Cb = React.useCallback;

/* ══════════════════ AUTH ══════════════════ */
function login(email, pass) {
  return fetch(SUPA+'/auth/v1/token?grant_type=password', {
    method:'POST',
    headers:{'apikey':AKEY,'Content-Type':'application/json'},
    body:JSON.stringify({email:email.trim(), password:pass})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.access_token) return {ok:true, token:d.access_token, email:d.user.email};
    return {ok:false, err:d.error_description||'بريد أو كلمة مرور خاطئة'};
  }).catch(function(){return {ok:false, err:'خطأ في الاتصال'};});
}

/* ══════════════════ DB HELPERS ══════════════════
   Simple pattern: do the operation, then call load()
   load() always fetches fresh data from Supabase
   This guarantees UI is always in sync with DB
══════════════════════════════════════════════════ */
function apiH(token) {
  return {'apikey':AKEY,'Authorization':'Bearer '+token,'Content-Type':'application/json'};
}

/* Fetch ALL codes — used after every operation */
function apiAll(token) {
  return fetch(SUPA+'/rest/v1/subscription_codes?select=*&order=created_at.desc', {
    headers: apiH(token)
  }).then(function(r){
    if(!r.ok){console.error('GET failed:',r.status);return null;}
    return r.json();
  }).catch(function(e){console.error('GET error:',e);return null;});
}

/* Insert */
function apiInsert(token, data) {
  return fetch(SUPA+'/rest/v1/subscription_codes', {
    method:'POST',
    headers:Object.assign({},apiH(token),{'Prefer':'return=representation'}),
    body:JSON.stringify(data)
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){return {ok:false,err:'Error '+r.status+': '+t};});
    return r.json().then(function(d){
      return (d&&d.length) ? {ok:true} : {ok:false,err:'لم يُعاد الكود — تحقق من الـ policies'};
    });
  }).catch(function(e){return {ok:false,err:e.message};});
}

/* Patch */
function apiPatch(token, id, fields) {
  return fetch(SUPA+'/rest/v1/subscription_codes?id=eq.'+id, {
    method:'PATCH',
    headers:Object.assign({},apiH(token),{'Prefer':'return=minimal'}),
    body:JSON.stringify(fields)
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){return {ok:false,err:'Error '+r.status+': '+t};});
    return {ok:true};
  }).catch(function(e){return {ok:false,err:e.message};});
}

/* Delete */
function apiDelete(token, id) {
  return fetch(SUPA+'/rest/v1/subscription_codes?id=eq.'+id, {
    method:'DELETE',
    headers:apiH(token)
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){return {ok:false,err:'Error '+r.status+': '+t};});
    return {ok:true};
  }).catch(function(e){return {ok:false,err:e.message};});
}

/* ══════════════════ GITHUB ══════════════════ */
function ghSha(tok) {
  return fetch(GHAPI,{headers:{'Authorization':'token '+tok,'Accept':'application/vnd.github.v3+json'}})
    .then(function(r){return r.status===404?null:r.ok?r.json().then(function(d){return d.sha;}):Promise.resolve('ERR');})
    .catch(function(){return 'ERR';});
}
function ghSend(tok, title, body) {
  var n={id:'n_'+Date.now(),title:title.trim(),body:body.trim(),sentAt:new Date().toISOString()};
  var c=btoa(unescape(encodeURIComponent(JSON.stringify(n,null,2))));
  return ghSha(tok).then(function(sha){
    if(sha==='ERR') return {ok:false,msg:'خطأ في GitHub Token'};
    var p={message:'إشعار: '+title,content:c};if(sha)p.sha=sha;
    return fetch(GHAPI,{method:'PUT',headers:{'Authorization':'token '+tok,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(p)})
      .then(function(r){return r.ok?{ok:true,n:n}:r.json().then(function(e){return {ok:false,msg:e.message||'Error '+r.status};});})
      .catch(function(){return {ok:false,msg:'خطأ في الشبكة'};});
  });
}

/* ══════════════════ UTILS ══════════════════ */
function dFmt(d){return d?new Date(d).toLocaleDateString('ar-SA'):'—';}
function dLeft(d){return Math.ceil((new Date(d)-new Date())/864e5);}
function expD(m){var d=new Date();d.setMonth(d.getMonth()+m);return d.toISOString();}
function expL(m){var d=new Date();d.setMonth(d.getMonth()+m);return d.toLocaleDateString('ar-SA');}
function genCode(){var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',o='';for(var i=0;i<8;i++)o+=c[Math.floor(Math.random()*c.length)];return o;}

/* ══════════════════ TOAST ══════════════════ */
var _tt=null;
function useToast(){
  var s=St(null);var t=s[0];var set=s[1];
  var show=Cb(function(msg,type){
    if(_tt)clearTimeout(_tt);
    set({msg:msg,type:type||'ok',k:Date.now()});
    _tt=setTimeout(function(){set(null);},3500);
  },[]);
  return {t:t,show:show};
}
function Toast(p){
  if(!p.t)return null;
  var C={ok:'#10B981',err:'#EF4444',warn:'#F59E0B',info:'#6366F1'};
  return h('div',{className:'toast',style:{background:C[p.t.type]||C.ok},key:p.t.k},p.t.msg);
}

/* ══════════════════ LOGIN ══════════════════ */
function Login(p){
  var es=St('');var em=es[0];var sEm=es[1];
  var ps=St('');var pw=ps[0];var sPw=ps[1];
  var ls=St(false);var ld=ls[0];var sLd=ls[1];
  var ms=St('');var msg=ms[0];var sMsg=ms[1];
  var vs=St(false);var vis=vs[0];var sVis=vs[1];
  function go(){
    if(!em.trim()||!pw){sMsg('أدخل البريد وكلمة المرور');return;}
    sLd(true);sMsg('');
    login(em,pw).then(function(r){sLd(false);if(r.ok)p.onLogin(r);else sMsg(r.err);});
  }
  return h('div',{className:'lp'},
    h('div',{className:'lc'},
      h('div',{className:'ll'},'🔐'),
      h('div',{style:{fontSize:19,fontWeight:900,marginBottom:4}},'لوحة إدارة AdVax'),
      h('div',{style:{fontSize:12,color:'#3E3C6A',marginBottom:8}},'CraftCost Pro'),
      h('div',{style:{background:'rgba(16,185,129,.07)',border:'1px solid rgba(16,185,129,.18)',borderRadius:7,padding:'5px 10px',fontSize:11,color:'#10B981',marginBottom:22}},'🔒 Supabase Authentication'),
      h('div',{style:{textAlign:'right',marginBottom:10}},
        h('label',{className:'lb'},'البريد الإلكتروني'),
        h('input',{type:'email',value:em,placeholder:'admin@advax.com',onChange:function(e){sEm(e.target.value);},onKeyDown:function(e){if(e.key==='Enter')go();}})
      ),
      h('div',{style:{textAlign:'right',marginBottom:14}},
        h('label',{className:'lb'},'كلمة المرور'),
        h('div',{style:{position:'relative'}},
          h('input',{type:vis?'text':'password',value:pw,placeholder:'••••••••',style:{paddingLeft:38},onChange:function(e){sPw(e.target.value);},onKeyDown:function(e){if(e.key==='Enter')go();}}),
          h('button',{onClick:function(){sVis(!vis);},style:{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',background:'none',color:'#3E3C6A',padding:'2px 4px',fontSize:15}},vis?'🙈':'👁')
        )
      ),
      msg&&h('div',{style:{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',borderRadius:7,padding:'7px 11px',fontSize:12,color:'#EF4444',marginBottom:10}},msg),
      h('button',{className:'b bp blg',style:{width:'100%',justifyContent:'center'},onClick:go,disabled:ld||!em.trim()||!pw},ld?'⏳ جاري التحقق...':'دخول ←')
    )
  );
}

/* ══════════════════════════════════════════════
   CODES PAGE
   
   THE FIX: Every operation does:
   1. Call Supabase (patch/delete/insert)
   2. If success → call load() to fetch fresh data
   3. load() calls setCodes(freshData) → React re-renders
   
   This is the ONLY reliable way with React 18 UMD + Supabase REST.
══════════════════════════════════════════════ */
var PLANS=[{v:'monthly',l:'شهري',m:1},{v:'quarterly',l:'ربع سنوي',m:3},{v:'biannual',l:'نصف سنوي',m:6},{v:'yearly',l:'سنوي',m:12}];

function CodesPage(p) {
  var tok=p.tok; var show=p.show;

  var cs=St([]); var codes=cs[0]; var setCodes=cs[1];
  var ls=St(true); var loading=ls[0]; var setLoading=ls[1];
  var fs=St('all'); var filter=fs[0]; var setFilter=fs[1];
  var ws=St(null); var busyId=ws[0]; var setBusy=ws[1];
  var as=St(false); var adding=as[0]; var setAdding=as[1];
  var ns=St({code:'',label:'',note:'',plan:'monthly',months:1});
  var nc=ns[0]; var setNc=ns[1];

  /* ── THE KEY FUNCTION ──
     Always fetches fresh data from Supabase.
     Called after every successful operation.
     Guarantees UI matches DB. */
  function load() {
    setLoading(true);
    apiAll(tok).then(function(data) {
      setLoading(false);
      if (data !== null) {
        setCodes(data);  /* This WILL trigger re-render */
      } else {
        show('❌ فشل تحميل الأكواد', 'err');
      }
    });
  }

  Ef(function(){load();},[]);

  /* ── Add ── */
  function doAdd() {
    var code=nc.code.trim().toUpperCase();
    if(!code){show('أدخل الكود','warn');return;}
    if(codes.find(function(c){return c.code===code;})){show('❌ الكود موجود مسبقاً','err');return;}
    setAdding(true);
    apiInsert(tok,{code:code,label:nc.label.trim(),note:nc.note.trim(),plan:nc.plan,expires_at:expD(nc.months),is_active:true,device_id:'',device_info:'',use_count:0})
    .then(function(r){
      setAdding(false);
      if(r.ok){
        show('✅ تم إنشاء الكود: '+code);
        setNc({code:'',label:'',note:'',plan:'monthly',months:1});
        load(); /* RELOAD → UI updates */
      }else{
        show('❌ '+r.err,'err');
      }
    });
  }

  /* ── Toggle ── */
  function doToggle(id, current) {
    setBusy(id);
    apiPatch(tok, id, {is_active:!current}).then(function(r){
      setBusy(null);
      if(r.ok){
        show(!current?'✅ تم تفعيل الكود':'⛔ تم إيقاف الكود', !current?'ok':'warn');
        load(); /* RELOAD → UI updates */
      }else{
        show('❌ '+r.err,'err');
        load(); /* Reload anyway to show real state */
      }
    });
  }

  /* ── Delete ── */
  function doDelete(id, code) {
    if(!window.confirm('حذف الكود '+code+'؟\nلا يمكن التراجع.'))return;
    setBusy(id);
    apiDelete(tok, id).then(function(r){
      setBusy(null);
      if(r.ok){
        show('🗑 تم حذف '+code,'err');
        load(); /* RELOAD → UI updates */
      }else{
        show('❌ '+r.err,'err');
        load();
      }
    });
  }

  /* ── Reset device ── */
  function doResetDev(id, code) {
    if(!window.confirm('إعادة تعيين الجهاز للكود '+code+'؟'))return;
    setBusy(id);
    apiPatch(tok, id, {device_id:'',device_info:''}).then(function(r){
      setBusy(null);
      if(r.ok){show('✅ تم إعادة تعيين الجهاز');load();}
      else{show('❌ '+r.err,'err');}
    });
  }

  /* ── Extend ── */
  function doExtend(id, code, months) {
    var c=codes.find(function(x){return x.id===id;});if(!c)return;
    var base=new Date(c.expires_at)>new Date()?new Date(c.expires_at):new Date();
    base.setMonth(base.getMonth()+months);
    setBusy(id);
    apiPatch(tok, id, {expires_at:base.toISOString(),is_active:true}).then(function(r){
      setBusy(null);
      if(r.ok){show('✅ تم تمديد '+code+' '+months+' شهر');load();}
      else{show('❌ '+r.err,'err');}
    });
  }

  /* ── Copy ── */
  function doCopy(code){
    if(navigator.clipboard)navigator.clipboard.writeText(code).then(function(){show('📋 تم نسخ: '+code);});
  }

  /* Filter */
  var list=codes.filter(function(c){
    var exp=new Date(c.expires_at)<new Date();
    var dl=dLeft(c.expires_at);
    if(filter==='active')  return c.is_active&&!exp;
    if(filter==='stopped') return !c.is_active;
    if(filter==='expired') return exp;
    if(filter==='soon')    return c.is_active&&!exp&&dl<=7&&dl>0;
    return true;
  });

  var cnt={
    all:codes.length,
    active:codes.filter(function(c){return c.is_active&&new Date(c.expires_at)>new Date();}).length,
    stopped:codes.filter(function(c){return !c.is_active;}).length,
    expired:codes.filter(function(c){return new Date(c.expires_at)<new Date();}).length,
    soon:codes.filter(function(c){var d=dLeft(c.expires_at);return c.is_active&&d>0&&d<=7;}).length
  };

  return h('div',null,

    /* Stats */
    h('div',{className:'g4',style:{marginBottom:13}},
      [{n:cnt.all,l:'إجمالي',c:'#A78BFA'},{n:cnt.active,l:'نشط',c:'#10B981'},{n:cnt.soon,l:'ينتهي قريباً',c:'#F59E0B'},{n:cnt.stopped+cnt.expired,l:'موقوف/منتهي',c:'#EF4444'}]
      .map(function(s,i){
        return h('div',{key:i,className:'sv'},h('div',{className:'sn',style:{color:s.c}},s.n),h('div',{className:'sl'},s.l));
      })
    ),

    /* Create form */
    h('div',{className:'card'},
      h('div',{className:'ch'},'➕ إنشاء كود اشتراك'),
      h('div',{className:'g3',style:{marginBottom:11}},
        h('div',null,
          h('label',{className:'lb'},'الكود *'),
          h('div',{style:{display:'flex',gap:6}},
            h('input',{value:nc.code,placeholder:'CRAFT2025',maxLength:12,style:{letterSpacing:2,fontWeight:700,fontSize:15},
              onChange:function(e){setNc(function(p){return Object.assign({},p,{code:e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'')});});}}),
            h('button',{className:'b bo',style:{flexShrink:0,padding:'9px 10px'},title:'توليد عشوائي',
              onClick:function(){setNc(function(p){return Object.assign({},p,{code:genCode()});});}
            },'🔀')
          )
        ),
        h('div',null,
          h('label',{className:'lb'},'اسم العميل'),
          h('input',{value:nc.label,placeholder:'محمد أحمد',onChange:function(e){setNc(function(p){return Object.assign({},p,{label:e.target.value});});}})
        ),
        h('div',null,
          h('label',{className:'lb'},'ملاحظة'),
          h('input',{value:nc.note,placeholder:'خاصة بك...',onChange:function(e){setNc(function(p){return Object.assign({},p,{note:e.target.value});});}})
        )
      ),
      h('div',{style:{marginBottom:11}},
        h('label',{className:'lb'},'مدة الاشتراك'),
        h('div',{style:{display:'flex',gap:5,flexWrap:'wrap'}},
          PLANS.map(function(pl){
            return h('button',{key:pl.v,className:'b '+(nc.plan===pl.v?'bp':'bo'),
              onClick:function(){setNc(function(p){return Object.assign({},p,{plan:pl.v,months:pl.m});});}
            },pl.l,' (',pl.m,')');
          })
        )
      ),
      nc.code.trim()&&h('div',{style:{background:'rgba(124,58,237,.08)',border:'1px solid rgba(124,58,237,.2)',borderRadius:7,padding:'6px 11px',marginBottom:11,fontSize:12,color:'#A78BFA'}},

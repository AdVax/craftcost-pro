<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>لوحة إدارة AdVax — CraftCost Pro</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;direction:rtl;background:#08080F;color:#E4E4F0;min-height:100vh}
input,select,textarea,button{font-family:'Cairo',sans-serif}
input,select,textarea{background:#0E0E1C;border:1.5px solid #272750;color:#E4E4F0;padding:10px 14px;border-radius:10px;width:100%;outline:none;transition:border-color .2s;direction:rtl;font-size:15px}

input[type="email"]{direction:ltr;text-align:right}
select option{background:#181830}
button{cursor:pointer;user-select:none;border:none;font-family:'Cairo',sans-serif}

.top{background:#0E0E1C;border-bottom:1.5px solid #1C1C3A;padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.wrap{max-width:940px;margin:0 auto;padding:22px 16px}

.bp:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(124,58,237,.45)}
.bp:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

.bo:hover{border-color:#9D60FF;color:#9D60FF}
.br{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);color:#EF4444}
.br:hover{background:rgba(239,68,68,.2)}
.bg2{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.28);color:#10B981}

.tw{overflow-x:auto;border-radius:12px;border:1.5px solid #1C1C3A}

.tabs{display:flex;gap:7px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:9px 16px;border-radius:9px;font-size:13px;font-weight:700;color:#7878A8;background:#181830;border:1.5px solid #1C1C3A;transition:all .2s;cursor:pointer}
.tab.on{background:rgba(124,58,237,.12);color:#9D60FF;border-color:rgba(124,58,237,.28)}
.sc{background:#111124;border:1.5px solid #1C1C3A;border-radius:13px;padding:16px}
.ibox{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-radius:10px;padding:11px 14px;font-size:12px;margin-bottom:12px;color:#9D60FF;display:flex;gap:8px;line-height:1.6}
.wbox{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:12px;color:#F59E0B;line-height:1.6}
.ebox{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:11px 14px;font-size:13px;color:#EF4444}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:11px;font-weight:800;font-size:13px;z-index:9999;box-shadow:0 8px 28px rgba(0,0,0,.5);white-space:nowrap;color:#fff;animation:fu .3s}
@keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.fu{animation:fu .3s}

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script>
'use strict';
var _useState=React.useState,_useEffect=React.useEffect,_useCallback=React.useCallback;
function h(){return React.createElement.apply(React,arguments)}

/* ════════ CONFIG ════════ */
var SUPA_URL='https://jqkmtqbhxsuvvumudgrj.supabase.co';
var SUPA_KEY='sb_publishable_0KbQ1aL7rWoJCkk84OUVKQ_Krc4nvwS';
var APP_URL ='https://craftcost-pro.advax.workers.dev';
var GH_OWNER='Advax';
var GH_REPO ='craftcost-notification';
var GH_FILE ='latest.json';
var GH_API  ='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE;

/* ════════ Supabase Auth ════════ */
function authHdrs(token){
  return{
    'apikey':SUPA_KEY,
    'Authorization':'Bearer '+(token||SUPA_KEY),
    'Content-Type':'application/json'
  };
}

/* Sign in with email + password — returns {ok, token, email, error} */
function supaSignIn(email,password){
  return fetch(SUPA_URL+'/auth/v1/token?grant_type=password',{
    method:'POST',
    headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({email:email.trim(),password:password})
  }).then(function(r){
    return r.json().then(function(d){
      if(d.access_token)return{ok:true,token:d.access_token,email:d.user&&d.user.email};
      return{ok:false,error:d.error_description||d.msg||'بريد أو كلمة مرور غير صحيحة'};
    });
  }).catch(function(){return{ok:false,error:'خطأ في الاتصال — تحقق من الإنترنت'};});
}

/* Refresh session */
function supaRefresh(refreshToken){
  return fetch(SUPA_URL+'/auth/v1/token?grant_type=refresh_token',{
    method:'POST',
    headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({refresh_token:refreshToken})
  }).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
}

/* Supabase REST — uses admin token */
function dbGet(token,table,q){
  return fetch(SUPA_URL+'/rest/v1/'+table+'?'+(q||''),{
    headers:authHdrs(token)
  }).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
}
function dbPost(token,table,body){
  return fetch(SUPA_URL+'/rest/v1/'+table,{
    method:'POST',
    headers:Object.assign({},authHdrs(token),{Prefer:'return=representation'}),
    body:JSON.stringify(body)
  }).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
}
function dbPatch(token,table,q,body){
  return fetch(SUPA_URL+'/rest/v1/'+table+'?'+q,{
    method:'PATCH',
    headers:Object.assign({},authHdrs(token),{
      'Prefer':'return=representation',
      'Content-Type':'application/json'
    }),
    body:JSON.stringify(body)
  }).then(function(r){
    if(!r.ok)return r.text().then(function(t){console.error('PATCH error:',r.status,t);return false;});
    return r.json().then(function(d){
      // Supabase returns array of updated rows
      var updated=Array.isArray(d)?d.length:1;
      if(updated===0){console.warn('PATCH: 0 rows affected — check RLS policies');}
      return updated>0;
    }).catch(function(){return r.ok;});
  }).catch(function(e){console.error('PATCH fetch error:',e);return false;});
}
function dbDel(token,table,q){
  return fetch(SUPA_URL+'/rest/v1/'+table+'?'+q,{
    method:'DELETE',
    headers:Object.assign({},authHdrs(token),{
      'Prefer':'return=representation'
    })
  }).then(function(r){
    if(!r.ok)return r.text().then(function(t){console.error('DELETE error:',r.status,t);return false;});
    return r.json().then(function(d){
      var deleted=Array.isArray(d)?d.length:1;
      if(deleted===0){console.warn('DELETE: 0 rows affected — check RLS policies');}
      return deleted>0;
    }).catch(function(){return r.ok;});
  }).catch(function(e){console.error('DELETE fetch error:',e);return false;});
}

/* ════════ GitHub Notifications ════════ */
function ghGetSha(token){
  return fetch(GH_API,{
    headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}
  }).then(function(r){
    if(r.status===404)return null;
    if(!r.ok)return 'ERR';
    return r.json().then(function(d){return d.sha||null;});
  }).catch(function(){return 'ERR';});
}
function ghSend(ghToken,title,body){
  if(!ghToken)return Promise.resolve({ok:false,msg:'أدخل GitHub Token أولاً'});
  var notif={id:'n_'+Date.now(),title:title.trim(),body:body.trim(),sentAt:new Date().toISOString()};
  var content=btoa(unescape(encodeURIComponent(JSON.stringify(notif,null,2))));
  return ghGetSha(ghToken).then(function(sha){
    if(sha==='ERR')return{ok:false,msg:'خطأ في الاتصال بـ GitHub'};
    var payload={message:'إشعار: '+title,content:content};
    if(sha)payload.sha=sha;
    return fetch(GH_API,{
      method:'PUT',
      headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify(payload)
    }).then(function(r){
      if(r.ok)return{ok:true,notif:notif};
      return r.json().then(function(e){return{ok:false,msg:e.message||'GitHub Error '+r.status};});
    }).catch(function(){return{ok:false,msg:'خطأ في الشبكة'};});
  });
}

/* ════════ Utils ════════ */
function uid(){return Math.random().toString(36).slice(2,9);}
function fmtD(d){return d?new Date(d).toLocaleDateString('ar-SA'):'—';}
function dLeft(d){return Math.ceil((new Date(d)-new Date())/864e5);}
function genCode(){var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:8},function(){return c[Math.floor(Math.random()*c.length)];}).join('');}
function expDate(m){var d=new Date();d.setMonth(d.getMonth()+m);return d.toISOString();}
function expLabel(m){var d=new Date();d.setMonth(d.getMonth()+m);return d.toLocaleDateString('ar-SA');}

function useLS(k,d0){
  var s=_useState(function(){try{var x=localStorage.getItem(k);return x?JSON.parse(x):d0;}catch(e){return d0;}});
  var v=s[0],sv=s[1];
  _useEffect(function(){localStorage.setItem(k,JSON.stringify(v));},[v,k]);
  return[v,sv];
}

/* ════════ Toast ════════ */
function useToast(){
  var s=_useState(null);var t=s[0],st=s[1];
  var show=_useCallback(function(msg,type){
    st({msg:msg,type:type||'ok'});
    setTimeout(function(){st(null);},3500);
  },[]);
  return{t:t,show:show};
}
function Toast(props){
  if(!props.t)return null;
  var C={ok:'#10B981',err:'#EF4444',warn:'#F59E0B',info:'#3B82F6'};
  return h('div',{className:'toast',style:{background:C[props.t.type]||C.ok}},props.t.msg);
}

/* ════════ Login — Supabase Auth ════════ */
function Login(props){
  var es=_useState('');var email=es[0],setEmail=es[1];
  var ps=_useState('');var pass=ps[0],setPass=ps[1];
  var ls=_useState(false);var loading=ls[0],setL=ls[1];
  var ers=_useState('');var err=ers[0],setErr=ers[1];
  var ss=_useState(false);var showPass=ss[0],setSP=ss[1];

  function submit(){
    if(!email.trim()||!pass)return;
    setL(true);setErr('');
    supaSignIn(email,pass).then(function(res){
      setL(false);
      if(res.ok){props.onLogin(res);}
      else{setErr(res.error||'بريد أو كلمة مرور غير صحيحة');}
    });
  }

  return h('div',{className:'lp'},
    h('div',{className:'lb'},
      h('div',{style:{width:72,height:72,borderRadius:18,background:'linear-gradient(135deg,#7C3AED,#9D60FF)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:32,margin:'0 auto 16px',boxShadow:'0 8px 28px rgba(124,58,237,.4)'}},'🔐'),
      h('h1',{style:{fontSize:22,fontWeight:900,marginBottom:4}},'لوحة إدارة AdVax'),
      h('p',{style:{fontSize:13,color:'#7878A8',marginBottom:6}},'CraftCost Pro'),
      h('div',{style:{background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.2)',borderRadius:8,padding:'7px 12px',fontSize:11,color:'#10B981',marginBottom:24}},'🔒 محمية بـ Supabase Authentication'),

      h('div',{style:{textAlign:'right',marginBottom:12}},
        h('label',{className:'lbl'},'البريد الإلكتروني'),
        h('input',{type:'email',value:email,onChange:function(e){setEmail(e.target.value);},onKeyDown:function(e){if(e.key==='Enter')submit();},placeholder:'admin@advax.com'})
      ),
      h('div',{style:{textAlign:'right',marginBottom:err?0:16}},
        h('label',{className:'lbl'},'كلمة المرور'),
        h('div',{style:{position:'relative'}},
          h('input',{type:showPass?'text':'password',value:pass,onChange:function(e){setPass(e.target.value);},onKeyDown:function(e){if(e.key==='Enter')submit();},placeholder:'••••••••',style:{paddingLeft:44}}),
          h('button',{onClick:function(){setSP(!showPass);},style:{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',background:'none',color:'#7878A8',fontSize:16,padding:'2px 4px'}},showPass?'🙈':'👁')
        )
      ),
      err&&h('div',{className:'ebox',style:{margin:'10px 0',borderRadius:9}},err),
      h('button',{className:'btn bp',style:{width:'100%',justifyContent:'center',padding:'13px',marginTop:8,fontSize:15},onClick:submit,disabled:loading||!email.trim()||!pass},
        loading?h('span',null,'جاري التحقق...'):'دخول ←'
      ),
      h('p',{style:{marginTop:16,fontSize:11,color:'#4C4C7A',lineHeight:1.7}},
        'الدخول عبر Supabase Authentication فقط',h('br'),
        'لا يوجد كلمة سر مكشوفة في الكود 🔒'
      )
    )
  );
}

/* ════════ Stats ════════ */
function StatsBar(props){
  var codes=props.codes;
  var active  =codes.filter(function(c){return c.is_active&&new Date(c.expires_at)>new Date();}).length;
  var expired =codes.filter(function(c){return new Date(c.expires_at)<new Date();}).length;
  var soon    =codes.filter(function(c){return c.is_active&&dLeft(c.expires_at)<=7&&dLeft(c.expires_at)>0;}).length;
  var stopped =codes.filter(function(c){return !c.is_active&&new Date(c.expires_at)>new Date();}).length;
  var stats=[
    {ic:'🔑',l:'إجمالي الأكواد',v:codes.length,c:'#9D60FF'},
    {ic:'✅',l:'نشط',v:active,c:'#10B981'},
    {ic:'⏰',l:'ينتهي قريباً',v:soon,c:'#F59E0B'},
    {ic:'❌',l:'منتهي/موقوف',v:expired+stopped,c:'#EF4444'},
  ];
  return h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}},
    h('div',{className:'g4',style:{flex:1}},
      stats.map(function(s,i){
        return h('div',{key:i,className:'sc'},
          h('div',{style:{fontSize:20,marginBottom:7}},s.ic),
          h('div',{style:{fontSize:22,fontWeight:900,color:s.c,marginBottom:2}},s.v),
          h('div',{style:{fontSize:12,color:'#7878A8'}},s.l)
        );
      })
    ),
    h('button',{className:'btn bo bsm',onClick:props.onRefresh,disabled:props.loading},props.loading?'جاري..':'🔄 تحديث')
  );
}

/* ════════ Code Manager ════════ */
var PLANS=[
  {v:'monthly',  l:'شهري',      m:1},
  {v:'quarterly',l:'ربع سنوي', m:3},
  {v:'biannual', l:'نصف سنوي', m:6},
  {v:'yearly',   l:'سنوي',     m:12},
];

function CodeMgr(props){
  var token=props.token, showToast=props.showToast, onRefresh=props.onRefresh;
  var codes=props.codes;

  // Form state
  var ns=_useState({code:'',label:'',note:'',plan:'monthly',months:1});
  var nc=ns[0],setNc=ns[1];

  // Filter state
  var fs=_useState('all');
  var filter=fs[0],setF=fs[1];

  // Loading state per operation
  var ls=_useState(false);
  var loading=ls[0],setL=ls[1];

  // ── Add new code ──────────────────────────────
  function addCode(){
    var code=nc.code.trim().toUpperCase();
    if(!code){showToast('أدخل الكود','warn');return;}
    
    // Check duplicate
    var exists=codes.find(function(c){return c.code===code;});
    if(exists){showToast('❌ الكود موجود مسبقاً','err');return;}
    
    setL(true);
    var row={
      code:code,
      label:nc.label.trim(),
      note:nc.note.trim(),
      plan:nc.plan,
      expires_at:expDate(nc.months),
      is_active:true,
      device_id:'',
      device_info:'',
      use_count:0
    };
    
    dbPost(token,'subscription_codes',row).then(function(res){
      setL(false);
      // Supabase returns array on success
      var created = Array.isArray(res)?res[0]:res;
      if(created && created.id){
        showToast('✅ تم إنشاء الكود: '+code);
        setNc({code:'',label:'',note:'',plan:'monthly',months:1});
        // Refresh to get latest data
        onRefresh();
      }else{
        showToast('❌ فشل الحفظ — حاول مرة أخرى','err');
      }
    });
  }

  // ── Toggle active/inactive ────────────────────
  function toggle(id,currentActive){
    var newVal=!currentActive;
    // Optimistic update — show change immediately
    setCodes(function(p){return p.map(function(c){return c.id===id?Object.assign({},c,{is_active:newVal}):c;});});
    showToast(newVal?'✅ تم التفعيل':'⛔ تم الإيقاف', newVal?'ok':'warn');
    // Then sync with Supabase in background
    dbPatch(token,'subscription_codes','id=eq.'+id,{is_active:newVal}).then(function(ok){
      if(!ok){
        // Revert if failed
        setCodes(function(p){return p.map(function(c){return c.id===id?Object.assign({},c,{is_active:currentActive}):c;});});
        showToast('❌ فشل — تأكد من تشغيل SQL الأمان','err');
      }else{
        onRefresh(); // silent sync
      }
    });
  }

  // ── Reset device binding ──────────────────────
  function resetDev(id,codeName){
    if(!window.confirm('Reset device for code: '+codeName))return;
    // Optimistic
    setCodes(function(p){return p.map(function(c){return c.id===id?Object.assign({},c,{device_id:'',device_info:''}):c;});});
    showToast('✅ تم إعادة تعيين الجهاز');
    dbPatch(token,'subscription_codes','id=eq.'+id,{device_id:'',device_info:''}).then(function(ok){
      if(!ok){showToast('❌ فشل التحديث','err');onRefresh();}
    });
  }

  // ── Extend expiry ─────────────────────────────
  function extend(id,months,codeName){
    var c=codes.find(function(x){return x.id===id;});
    if(!c)return;
    var base=new Date(c.expires_at)>new Date()?new Date(c.expires_at):new Date();
    base.setMonth(base.getMonth()+months);
    var iso=base.toISOString();
    // Optimistic
    setCodes(function(p){return p.map(function(x){return x.id===id?Object.assign({},x,{expires_at:iso,is_active:true}):x;});});
    showToast('✅ تم تمديد '+codeName+' '+months+' شهر');
    dbPatch(token,'subscription_codes','id=eq.'+id,{expires_at:iso,is_active:true}).then(function(ok){
      if(!ok){showToast('❌ فشل التمديد','err');onRefresh();}
    });
  }

  // ── Delete code ───────────────────────────────
  function delCode(id,codeName){
    if(!window.confirm('Delete: '+codeName+'? Cannot undo.'))return;
    // Optimistic remove
    setCodes(function(p){return p.filter(function(c){return c.id!==id;});});
    showToast('🗑 تم حذف '+codeName,'err');
    dbDel(token,'subscription_codes','id=eq.'+id).then(function(ok){
      if(!ok){
        showToast('❌ فشل الحذف — سيُعاد تحميل البيانات','err');
        onRefresh(); // reload to restore
      }
    });
  }

  // ── Copy code ─────────────────────────────────
  function copy(code){
    if(navigator.clipboard){

/* ════════ Notifications ════════ */
function Notifs(props){
  var showToast=props.showToast;
  var ts=_useState('');var title=ts[0],setTitle=ts[1];
  var bs=_useState('');var body=bs[0],setBody=bs[1];
  var tks=_useState(function(){return localStorage.getItem('cc-gh-token')||'';});var ghTok=tks[0],setGhTok=tks[1];
  var tis=_useState('');var tokInput=tis[0],setTI=tis[1];
  var shs=_useState(false);var showTok=shs[0],setST=shs[1];
  var sds=_useState(false);var sending=sds[0],setSending=sds[1];
  var lg=useLS('cc-notif-log',[]);var log=lg[0],setLog=lg[1];

  function saveTok(){
    var t=tokInput.trim();if(!t)return;
    localStorage.setItem('cc-gh-token',t);setGhTok(t);setTI('');setST(false);
    showToast('✅ تم حفظ الـ Token');
  }
  function removeTok(){localStorage.removeItem('cc-gh-token');setGhTok('');showToast('تم الحذف','warn');}

  function send(){
    if(!title.trim()){showToast('اكتب العنوان','warn');return;}
    if(!ghTok){showToast('أدخل GitHub Token','err');return;}
    setSending(true);
    ghSend(ghTok,title,body).then(function(res){
      setSending(false);
      if(res.ok){
        setLog(function(p){return[Object.assign({},res.notif,{loggedAt:new Date().toISOString()})].concat(p.slice(0,49));});
        showToast('✅ تم الإرسال — يصل للعملاء خلال ساعة');
        setTitle('');setBody('');
      }else showToast('❌ '+res.msg,'err');
    });
  }

  var masked=ghTok?ghTok.slice(0,8)+'•••••••••••'+ghTok.slice(-4):'';

  return h('div',null,
    h('div',{className:'sec',style:{background:ghTok?'rgba(16,185,129,.07)':'rgba(245,158,11,.07)',borderColor:ghTok?'rgba(16,185,129,.25)':'rgba(245,158,11,.25)'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
        h('h3',{style:{fontSize:15,fontWeight:800}},'🔑 GitHub Token'),
        ghTok?h('span',{className:'bdg bok'},'✓ مُعيَّن'):h('span',{className:'bdg bwrn'},'⚠️ مطلوب')
      ),
      ghTok
        ?h('div',null,
            h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:6}},
              h('div',{style:{flex:1,background:'#181830',borderRadius:8,padding:'8px 12px',fontFamily:'monospace',fontSize:13,color:'#10B981'}},'🔒 ',masked),
              h('button',{className:'btn br bsm',onClick:removeTok},'حذف')
            ),
            h('p',{style:{fontSize:11,color:'#7878A8'}},'✓ محفوظ في متصفحك فقط')
          )
        :h('div',null,
            h('div',{className:'wbox'},'💡 أنشئ Fine-grained token على GitHub بصلاحية Contents: Read & Write على مستودع craftcost-notification فقط'),
            h('div',{style:{display:'flex',gap:8,marginBottom:6}},
              h('input',{type:showTok?'text':'password',value:tokInput,
                onChange:function(e){setTI(e.target.value);},
                onKeyDown:function(e){if(e.key==='Enter')saveTok();},
                placeholder:'github_pat_...',style:{flex:1,fontFamily:'monospace'}}),
              h('button',{onClick:function(){setST(!showTok);},className:'btn bo bsm'},showTok?'🙈':'👁'),
              h('button',{onClick:saveTok,className:'btn bp bsm',disabled:!tokInput.trim()},'حفظ')
            ),
            h('p',{style:{fontSize:11,color:'#4C4C7A'}},'يُحفظ في متصفحك فقط — لا يُرسل لأي خادم')
          )
    ),
    h('div',{className:'sec'},
      h('h3',{style:{fontSize:15,fontWeight:800,marginBottom:8}},'📢 إرسال إشعار للعملاء'),
      h('div',{className:'ibox'},'📡 ','يُكتب الإشعار على GitHub ← يصل للعملاء تلقائياً خلال ساعة — مجاني'),
      h('div',{style:{marginBottom:10}},
        h('label',{className:'lbl'},'العنوان *'),
        h('input',{value:title,onChange:function(e){setTitle(e.target.value);},placeholder:'مثال: تحديث جديد ✨',maxLength:100})
      ),
      h('div',{style:{marginBottom:14}},
        h('label',{className:'lbl'},'التفاصيل (اختياري)'),
        h('textarea',{value:body,onChange:function(e){setBody(e.target.value);},rows:3,placeholder:'تفاصيل إضافية...',maxLength:300})
      ),
      title&&h('div',{style:{background:'rgba(124,58,237,.12)',border:'1.5px solid rgba(124,58,237,.28)',borderRadius:12,padding:'12px 14px',marginBottom:14}},
        h('div',{style:{fontSize:11,color:'#7878A8',marginBottom:6,fontWeight:700}},'معاينة:'),
        h('div',{style:{display:'flex',gap:8}},
          h('span',{style:{fontSize:20}},'📢'),
          h('div',null,
            h('div',{style:{fontSize:14,fontWeight:800,color:'#fff',marginBottom:2}},title),
            body&&h('div',{style:{fontSize:12,color:'rgba(255,255,255,.8)'}},body)
          )
        )
      ),
      h('button',{className:'btn bp',style:{width:'100%',justifyContent:'center',padding:'12px'},
        onClick:send,disabled:!title.trim()||!ghTok||sending},
        sending?'جاري الإرسال..':'📨 إرسال لجميع العملاء')
    ),
    log.length>0&&h('div',{className:'sec'},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
        h('h3',{style:{fontSize:15,fontWeight:800}},'📋 الإشعارات المُرسلة (',log.length,')'),
        h('button',{className:'btn br bsm',onClick:function(){if(window.confirm('مسح؟'))setLog([]);}},'مسح')
      ),
      h('div',{className:'tw'},h('table',null,
        h('thead',null,h('tr',null,h('th',null,'العنوان'),h('th',null,'التفاصيل'),h('th',null,'وقت الإرسال'))),
        h('tbody',null,log.map(function(n){
          return h('tr',{key:n.id},
            h('td',null,h('b',null,n.title)),
            h('td',null,h('span',{style:{fontSize:12,color:'#7878A8'}},n.body||'—')),
            h('td',null,h('span',{style:{fontSize:12}},fmtD(n.sentAt||n.loggedAt)))
          );
        }))
      ))
    )
  );
}

            ' · الاستخدام: ',testRes.uses||0,' مرة',
            ' · الجهاز: ',testRes.device,
            ' · الحالة: ',h('b',{style:{color:testRes.active?'#10B981':'#EF4444'}},testRes.active?'نشط':'موقوف')
          )
        )
      )
    )
  );
}

/* ════════ App Root ════════ */
function AdminApp(){
  /* auth state */
  var as=_useState(function(){
    try{var s=sessionStorage.getItem('cc-auth');return s?JSON.parse(s):null;}catch(e){return null;}
  });
  var auth=as[0],setAuth=as[1];

  var ts=_useState('codes');var tab=ts[0],setTab=ts[1];
  var cs=_useState([]);var codes=cs[0],setCodes=cs[1];
  var ls=_useState(false);var loading=ls[0],setL=ls[1];
  var toast=useToast();

  function onLogin(res){
    var sess={token:res.token,email:res.email};
    sessionStorage.setItem('cc-auth',JSON.stringify(sess));
    setAuth(sess);
  }

  function logout(){
    sessionStorage.removeItem('cc-auth');
    setAuth(null);
  }

  function refresh(showMsg){
    if(!auth)return;
    setL(true);
    dbGet(auth.token,'subscription_codes','select=*&order=created_at.desc').then(function(data){
      setL(false);
      if(data){
        setCodes(data);
        if(showMsg)toast.show('✅ تم التحديث — '+data.length+' كود');
      }else{
        if(showMsg)toast.show('❌ خطأ في التحميل','err');
      }
    });
  }
  
  // Silent background sync — no toast
  function syncCodes(){refresh(false);}

  _useEffect(function(){if(auth)refresh();},[auth&&auth.token]);

  if(!auth)return React.createElement(React.Fragment,null,
    React.createElement(Login,{onLogin:onLogin}),
    React.createElement(Toast,{t:toast.t})
  );

  var active=codes.filter(function(c){return c.is_active&&new Date(c.expires_at)>new Date();}).length;
  var tabs=[
    {id:'codes',ic:'🔑',l:'الأكواد'},
    {id:'users',ic:'👥',l:'المستخدمون'},
    {id:'notifs',ic:'📢',l:'الإشعارات'},
    {id:'settings',ic:'⚙️',l:'إعدادات'},
  ];

  return React.createElement(React.Fragment,null,
    h('div',{className:'top'},
      h('div',{style:{width:38,height:38,borderRadius:10,background:'linear-gradient(135deg,#7C3AED,#9D60FF)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}},'🔐'),
      h('div',{style:{flex:1}},
        h('div',{style:{fontWeight:900,fontSize:15,color:'#9D60FF'}},'لوحة إدارة AdVax — CraftCost Pro'),
        h('div',{style:{fontSize:12,color:'#7878A8'}},
          auth.email,' · ',active,' اشتراك نشط'
        )
      ),
      APP_URL&&h('a',{href:APP_URL,target:'_blank',className:'btn bo bsm',style:{textDecoration:'none',marginLeft:6}},'التطبيق ↗'),
      h('button',{className:'btn br bsm',onClick:logout},'تسجيل خروج')
    ),
    h('div',{className:'wrap fu'},
      h(StatsBar,{codes:codes,onRefresh:function(){refresh(true);},loading:loading}),
      h('div',{className:'tabs'},
        tabs.map(function(tb){
          return h('button',{key:tb.id,onClick:function(){setTab(tb.id);},
            className:'tab'+(tab===tb.id?' on':'')},tb.ic,' ',tb.l);
        })
      ),
      tab==='codes'   &&h(CodeMgr,  {token:auth.token,codes:codes,setCodes:setCodes,onRefresh:syncCodes,showToast:toast.show}),
      tab==='users'   &&h(Users,    {codes:codes}),
      tab==='notifs'  &&h(Notifs,   {showToast:toast.show}),
      tab==='settings'&&h(Settings, {token:auth.token,showToast:toast.show,userEmail:auth.email})
    ),
    h(Toast,{t:toast.t})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(AdminApp,null)
);
</script>
</body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<title>لوحة إدارة AdVax</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;direction:rtl;background:#070612;color:#E0DEF0;min-height:100vh}
input,select,textarea,button{font-family:'Cairo',sans-serif}
input,select,textarea{
  background:#0F0E1E;border:1.5px solid #222040;color:#E0DEF0;
  padding:9px 12px;border-radius:8px;width:100%;outline:none;
  transition:border-color .15s;direction:rtl;font-size:14px;
}
input:focus,select:focus,textarea:focus{border-color:#7C3AED}
select option{background:#161428}
button{cursor:pointer;border:none;font-family:'Cairo',sans-serif}
button:active{transform:scale(.97)}
button:disabled{opacity:.4;cursor:not-allowed;transform:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#222040;border-radius:3px}

/* Layout */
#bar{
  background:#0A091A;border-bottom:1px solid #181630;
  padding:12px 18px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:99;
}
.bar-logo{width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#7C3AED,#A78BFA);
  display:flex;align-items:center;justify-content:center;font-size:17px}
.bar-name{font-weight:900;font-size:14px;color:#A78BFA}
.bar-email{font-size:11px;color:#3E3C6A;margin-top:1px}
#wrap{max-width:1000px;margin:0 auto;padding:18px 14px 60px}

/* Tabs */
.tabs{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:700;
  color:#3E3C6A;background:#0F0E1E;border:1px solid #181630;cursor:pointer;transition:all .15s}
.tab.on{background:rgba(124,58,237,.18);color:#A78BFA;border-color:rgba(124,58,237,.4)}

/* Card */
.card{background:#0F0E1E;border:1px solid #181630;border-radius:11px;padding:16px;margin-bottom:12px}
.ch{font-size:14px;font-weight:800;color:#C4B5FD;margin-bottom:13px}

/* Buttons */
.b{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;
  border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
.b-p{background:linear-gradient(135deg,#7C3AED,#A78BFA);color:#fff}
.b-o{background:transparent;border:1px solid #222040;color:#C0BDDF}
.b-o:hover:not(:disabled){border-color:#7C3AED;color:#A78BFA}
.b-r{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);color:#EF4444}
.b-r:hover:not(:disabled){background:rgba(239,68,68,.2)}
.b-g{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.28);color:#10B981}
.b-g:hover:not(:disabled){background:rgba(16,185,129,.2)}
.b-y{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.28);color:#F59E0B}
.b-lg{padding:10px 22px;font-size:14px;border-radius:9px}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
@media(max-width:580px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* Stat */
.sv{background:#0F0E1E;border:1px solid #181630;border-radius:10px;padding:12px}
.sn{font-size:24px;font-weight:900;line-height:1}
.sl{font-size:11px;color:#3E3C6A;margin-top:4px}

/* Table */
.tw{overflow-x:auto;border-radius:9px;border:1px solid #181630}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:660px}
th{padding:8px 11px;text-align:right;color:#3E3C6A;font-weight:700;
  background:#0A091A;border-bottom:1px solid #181630;white-space:nowrap}
td{padding:9px 11px;border-bottom:1px solid #110F22;vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:rgba(124,58,237,.03)}
tr.dim td{opacity:.4}

/* Badge */
.bg{display:inline-flex;align-items:center;padding:3px 8px;
  border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.bg-g{background:rgba(16,185,129,.12);color:#10B981;border:1px solid rgba(16,185,129,.2)}
.bg-r{background:rgba(239,68,68,.12);color:#EF4444;border:1px solid rgba(239,68,68,.2)}
.bg-y{background:rgba(245,158,11,.12);color:#F59E0B;border:1px solid rgba(245,158,11,.2)}
.bg-p{background:rgba(124,58,237,.12);color:#A78BFA;border:1px solid rgba(124,58,237,.2)}
.bg-d{background:rgba(255,255,255,.05);color:#3E3C6A;border:1px solid rgba(255,255,255,.07)}

/* Form */
.lb{display:block;margin-bottom:4px;font-size:11px;font-weight:700;color:#3E3C6A;letter-spacing:.3px}

/* Toast */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  padding:9px 20px;border-radius:9px;font-weight:700;font-size:13px;
  z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.7);
  white-space:nowrap;color:#fff;pointer-events:none;
  animation:tin .2s ease-out}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(7px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Login */
.lp{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse 70% 50% at 50% 20%,rgba(124,58,237,.1),transparent)}
.lc{background:#0F0E1E;border:1px solid #222040;border-radius:18px;
  padding:30px 24px;width:100%;max-width:360px;text-align:center}
.ll{width:58px;height:58px;border-radius:14px;
  background:linear-gradient(135deg,#7C3AED,#A78BFA);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;margin:0 auto 14px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script>
'use strict';

/* ════════════════════════════════════════════
   CONFIG
════════════════════════════════════════════ */
var SUPA = 'https://jqkmtqbhxsuvvumudgrj.supabase.co';
var AKEY = 'sb_publishable_0KbQ1aL7rWoJCkk84OUVKQ_Krc4nvwS';
var APP  = 'https://craftcost-pro.advax.workers.dev';
var GH_API = 'https://api.github.com/repos/Advax/craftcost-notification/contents/latest.json';
var TABLE = SUPA + '/rest/v1/subscription_codes';

/* ════════════════════════════════════════════
   REACT
════════════════════════════════════════════ */
var h  = React.createElement;
var Fr = React.Fragment;
var St = React.useState;
var Ef = React.useEffect;
var Cb = React.useCallback;

/* ════════════════════════════════════════════
   SUPABASE AUTH
════════════════════════════════════════════ */
function supaLogin(email, pass) {
  return fetch(SUPA + '/auth/v1/token?grant_type=password', {
    method: 'POST',
    headers: { apikey: AKEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email.trim(), password: pass })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.access_token) return { ok: true, token: d.access_token, email: d.user.email };
    return { ok: false, err: d.error_description || 'بريد أو كلمة مرور خاطئة' };
  })
  .catch(function() { return { ok: false, err: 'خطأ في الاتصال بالإنترنت' }; });
}

/* ════════════════════════════════════════════
   SUPABASE DB HELPERS
   
   CRITICAL: Every write operation uses this pattern:
   1. Send PATCH/POST/DELETE
   2. Verify by reading the actual row from DB
   3. Return the verified row (not what we sent)
   
   This fixes Supabase silent-fail bug where
   it returns 200 but RLS blocked the write.
════════════════════════════════════════════ */

/* Build headers with admin token */
function H(token) {
  return {
    apikey: AKEY,
    Authorization: 'Bearer ' + token,
    'Content-Type': 'application/json'
  };
}

/* Fetch single row by id — returns row or null */
function dbFetch(token, id) {
  return fetch(TABLE + '?id=eq.' + id + '&select=*', { headers: H(token) })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(d) { return (d && d.length) ? d[0] : null; })
    .catch(function() { return null; });
}

/* Fetch all codes */
function dbAll(token) {
  return fetch(TABLE + '?select=*&order=created_at.desc', { headers: H(token) })
    .then(function(r) { return r.ok ? r.json() : null; })
    .catch(function() { return null; });
}

/*
  PATCH + VERIFY
  - Sends the PATCH
  - Immediately reads the row back from DB
  - Returns { ok: true, row } if verified, { ok: false, err } if not
*/
function dbPatch(token, id, fields) {
  return fetch(TABLE + '?id=eq.' + id, {
    method: 'PATCH',
    headers: Object.assign({}, H(token), { Prefer: 'return=minimal' }),
    body: JSON.stringify(fields)
  })
  .then(function(r) {
    if (!r.ok) {
      return r.text().then(function(t) {
        return { ok: false, err: 'Supabase error ' + r.status + ': ' + t };
      });
    }
    /* Verify: read the row back immediately */
    return dbFetch(token, id).then(function(row) {
      if (!row) return { ok: false, err: 'تعذّر قراءة البيانات بعد التحديث' };
      /* Check every field we tried to change actually changed */
      var keys = Object.keys(fields);
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        if (String(row[k]) !== String(fields[k])) {
          return {
            ok: false,
            err: 'RLS منع الكتابة — شغّل supabase-clean.sql في Supabase SQL Editor',
            row: row
          };
        }
      }
      return { ok: true, row: row };
    });
  })
  .catch(function(e) { return { ok: false, err: 'خطأ في الشبكة: ' + e.message }; });
}

/*
  INSERT + VERIFY
*/
function dbInsert(token, data) {
  return fetch(TABLE, {
    method: 'POST',
    headers: Object.assign({}, H(token), { Prefer: 'return=representation' }),
    body: JSON.stringify(data)
  })
  .then(function(r) {
    if (!r.ok) {
      return r.text().then(function(t) {
        return { ok: false, err: 'Supabase error ' + r.status + ': ' + t };
      });
    }
    return r.json().then(function(d) {
      if (d && d.length) return { ok: true, row: d[0] };
      return { ok: false, err: 'لم يُعاد الكود بعد الإنشاء' };
    });
  })
  .catch(function(e) { return { ok: false, err: e.message }; });
}

/*
  DELETE + VERIFY
*/
function dbDelete(token, id) {
  return fetch(TABLE + '?id=eq.' + id, {
    method: 'DELETE',
    headers: H(token)
  })
  .then(function(r) {
    if (!r.ok) {
      return r.text().then(function(t) {
        return { ok: false, err: 'خطأ ' + r.status + ': ' + t };
      });
    }
    /* Verify row is gone */
    return dbFetch(token, id).then(function(row) {
      if (row) return { ok: false, err: 'RLS منع الحذف — شغّل supabase-clean.sql' };
      return { ok: true };
    });
  })
  .catch(function(e) { return { ok: false, err: e.message }; });
}

/* ════════════════════════════════════════════
   GITHUB NOTIFICATIONS
════════════════════════════════════════════ */
function ghGetSha(tok) {
  return fetch(GH_API, { headers: { Authorization: 'token ' + tok, Accept: 'application/vnd.github.v3+json' } })
    .then(function(r) { return r.status === 404 ? null : r.ok ? r.json().then(function(d) { return d.sha; }) : 'ERR'; })
    .catch(function() { return 'ERR'; });
}
function ghSend(tok, title, body) {
  var n = { id: 'n_' + Date.now(), title: title.trim(), body: body.trim(), sentAt: new Date().toISOString() };
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(n, null, 2))));
  return ghGetSha(tok).then(function(sha) {
    if (sha === 'ERR') return { ok: false, msg: 'خطأ في GitHub Token' };
    var p = { message: 'إشعار: ' + title, content: content };
    if (sha) p.sha = sha;
    return fetch(GH_API, {
      method: 'PUT',
      headers: { Authorization: 'token ' + tok, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(p)
    }).then(function(r) {
      return r.ok ? { ok: true, notif: n } : r.json().then(function(e) { return { ok: false, msg: e.message || 'Error ' + r.status }; });
    }).catch(function() { return { ok: false, msg: 'خطأ في الشبكة' }; });
  });
}

/* ════════════════════════════════════════════
   UTILS
════════════════════════════════════════════ */
function dFmt(d) { return d ? new Date(d).toLocaleDateString('ar-SA') : '—'; }
function dLeft(d) { return Math.ceil((new Date(d) - new Date()) / 864e5); }
function expD(m) { var d = new Date(); d.setMonth(d.getMonth() + m); return d.toISOString(); }
function expL(m) { var d = new Date(); d.setMonth(d.getMonth() + m); return d.toLocaleDateString('ar-SA'); }
function genCode() {
  var c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789', o = '';
  for (var i = 0; i < 8; i++) o += c[Math.floor(Math.random() * c.length)];
  return o;
}

/* ════════════════════════════════════════════
   TOAST
════════════════════════════════════════════ */
var _tt = null;
function useToast() {
  var s = St(null); var toast = s[0]; var set = s[1];
  var show = Cb(function(msg, type) {
    if (_tt) clearTimeout(_tt);
    set({ msg: msg, type: type || 'ok', k: Date.now() });
    _tt = setTimeout(function() { set(null); }, 3500);
  }, []);
  return { toast: toast, show: show };
}
function Toast(p) {
  if (!p.t) return null;
  var C = { ok: '#10B981', err: '#EF4444', warn: '#F59E0B', info: '#6366F1' };
  return h('div', { className: 'toast', style: { background: C[p.t.type] || C.ok }, key: p.t.k }, p.t.msg);
}

/* ════════════════════════════════════════════
   LOGIN
════════════════════════════════════════════ */
function Login(p) {
  var es = St(''); var em = es[0]; var sEm = es[1];
  var ps = St(''); var pw = ps[0]; var sPw = ps[1];
  var ls = St(false); var ld = ls[0]; var sLd = ls[1];
  var ms = St(''); var msg = ms[0]; var sMsg = ms[1];
  var vs = St(false); var vis = vs[0]; var sVis = vs[1];

  function go() {
    if (!em.trim() || !pw) { sMsg('أدخل البريد وكلمة المرور'); return; }
    sLd(true); sMsg('');
    supaLogin(em, pw).then(function(r) {
      sLd(false);
      if (r.ok) p.onLogin(r); else sMsg(r.err);
    });
  }

  return h('div', { className: 'lp' },
    h('div', { className: 'lc' },
      h('div', { className: 'll' }, '🔐'),
      h('div', { style: { fontSize: 19, fontWeight: 900, marginBottom: 4 } }, 'لوحة إدارة AdVax'),
      h('div', { style: { fontSize: 12, color: '#3E3C6A', marginBottom: 8 } }, 'CraftCost Pro'),
      h('div', { style: { background: 'rgba(16,185,129,.07)', border: '1px solid rgba(16,185,129,.18)', borderRadius: 7, padding: '5px 10px', fontSize: 11, color: '#10B981', marginBottom: 22 } }, '🔒 Supabase Authentication'),
      h('div', { style: { textAlign: 'right', marginBottom: 10 } },
        h('label', { className: 'lb' }, 'البريد الإلكتروني'),
        h('input', { type: 'email', value: em, placeholder: 'admin@advax.com', onChange: function(e) { sEm(e.target.value); }, onKeyDown: function(e) { if (e.key === 'Enter') go(); } })
      ),
      h('div', { style: { textAlign: 'right', marginBottom: 14 } },
        h('label', { className: 'lb' }, 'كلمة المرور'),
        h('div', { style: { position: 'relative' } },
          h('input', { type: vis ? 'text' : 'password', value: pw, placeholder: '••••••••', style: { paddingLeft: 38 }, onChange: function(e) { sPw(e.target.value); }, onKeyDown: function(e) { if (e.key === 'Enter') go(); } }),
          h('button', { onClick: function() { sVis(!vis); }, style: { position: 'absolute', left: 8, top: '50%', transform: 'translateY(-50%)', background: 'none', color: '#3E3C6A', padding: '2px 4px', fontSize: 15 } }, vis ? '🙈' : '👁')
        )
      ),
      msg && h('div', { style: { background: 'rgba(239,68,68,.08)', border: '1px solid rgba(239,68,68,.2)', borderRadius: 7, padding: '7px 11px', fontSize: 12, color: '#EF4444', marginBottom: 10 } }, msg),
      h('button', { className: 'b b-p b-lg', style: { width: '100%', justifyContent: 'center' }, onClick: go, disabled: ld || !em.trim() || !pw }, ld ? '⏳ جاري التحقق...' : 'دخول ←')
    )
  );
}

/* ════════════════════════════════════════════
   CODES PAGE
   
   PATTERN:
   Every action → dbPatch/dbDelete (which verify) → update state
   State is ALWAYS the verified data from Supabase
════════════════════════════════════════════ */
var PLANS = [
  { v: 'monthly', l: 'شهري', m: 1 },
  { v: 'quarterly', l: 'ربع سنوي', m: 3 },
  { v: 'biannual', l: 'نصف سنوي', m: 6 },
  { v: 'yearly', l: 'سنوي', m: 12 }
];

function CodesPage(p) {
  var tok = p.tok; var show = p.show;

  var cs = St([]); var codes = cs[0]; var setCodes = cs[1];
  var ls = St(true); var loading = ls[0]; var setLoading = ls[1];
  var fs = St('all'); var filter = fs[0]; var setFilter = fs[1];
  var ws = St(null); var busy = ws[0]; var setBusy = ws[1];
  var as = St(false); var adding = as[0]; var setAdding = as[1];
  var ns = St({ code: '', label: '', note: '', plan: 'monthly', months: 1 });
  var nc = ns[0]; var setNc = ns[1];

  /* Load all codes */
  function load() {
    setLoading(true);
    dbAll(tok).then(function(d) {
      setLoading(false);
      if (d) setCodes(d);
      else show('❌ فشل تحميل الأكواد من Supabase', 'err');
    });
  }
  Ef(function() { load(); }, []);

  /* Add new code */
  function doAdd() {
    var code = nc.code.trim().toUpperCase();
    if (!code) { show('أدخل الكود', 'warn'); return; }
    if (codes.find(function(c) { return c.code === code; })) {
      show('❌ الكود ' + code + ' موجود مسبقاً', 'err'); return;
    }
    setAdding(true);
    dbInsert(tok, {
      code: code, label: nc.label.trim(), note: nc.note.trim(),
      plan: nc.plan, expires_at: expD(nc.months),
      is_active: true, device_id: '', device_info: '', use_count: 0
    }).then(function(r) {
      setAdding(false);
      if (r.ok) {
        setCodes(function(p) { return [r.row].concat(p); });
        setNc({ code: '', label: '', note: '', plan: 'monthly', months: 1 });
        show('✅ تم إنشاء الكود: ' + code);
      } else {
        show('❌ ' + r.err, 'err');
      }
    });
  }

  /*
    TOGGLE — uses dbPatch which verifies after write
    If RLS blocks → dbPatch returns ok:false with the actual DB value
    We show clear error and update UI with real value from DB
  */
  function doToggle(id, current) {
    setBusy(id);
    dbPatch(tok, id, { is_active: !current }).then(function(r) {
      setBusy(null);
      if (r.ok) {
        /* Update state with verified row from DB */
        setCodes(function(prev) {
          return prev.map(function(c) { return c.id === id ? r.row : c; });
        });
        show(!current ? '✅ تم تفعيل الكود' : '⛔ تم إيقاف الكود', !current ? 'ok' : 'warn');
      } else {
        /* If we have the actual DB row, update UI to show real state */
        if (r.row) {
          setCodes(function(prev) {
            return prev.map(function(c) { return c.id === id ? r.row : c; });
          });
        }
        show('❌ ' + r.err, 'err');
      }
    });
  }

  /* Delete — uses dbDelete which verifies row is gone */
  function doDelete(id, code) {
    if (!window.confirm('حذف الكود ' + code + '؟\nلا يمكن التراجع.')) return;
    setBusy(id);
    dbDelete(tok, id).then(function(r) {
      setBusy(null);
      if (r.ok) {
        setCodes(function(prev) { return prev.filter(function(c) { return c.id !== id; }); });
        show('🗑 تم حذف ' + code, 'err');
      } else {
        show('❌ ' + r.err, 'err');
        load(); /* reload to show real state */
      }
    });
  }

  /* Reset device */
  function doResetDevice(id, code) {
    if (!window.confirm('إعادة تعيين الجهاز للكود ' + code + '؟')) return;
    setBusy(id);
    dbPatch(tok, id, { device_id: '', device_info: '' }).then(function(r) {
      setBusy(null);
      if (r.ok) {
        setCodes(function(prev) { return prev.map(function(c) { return c.id === id ? r.row : c; }); });
        show('✅ تم إعادة تعيين الجهاز');
      } else {
        show('❌ ' + r.err, 'err');
      }
    });
  }

  /* Extend expiry */
  function doExtend(id, code, months) {
    var c = codes.find(function(x) { return x.id === id; });
    if (!c) return;
    var base = new Date(c.expires_at) > new Date() ? new Date(c.expires_at) : new Date();
    base.setMonth(base.getMonth() + months);
    setBusy(id);

      res && h('div', { style: { background: res.err ? 'rgba(239,68,68,.07)' : 'rgba(16,185,129,.07)', border: '1px solid ' + (res.err ? 'rgba(239,68,68,.2)' : 'rgba(16,185,129,.2)'), borderRadius: 8, padding: '9px 13px', fontSize: 12 } },
        res.err
          ? h('span', { style: { color: '#EF4444' } }, '❌ ', res.msg)
          : h('div', null,
              h('div', { style: { color: '#10B981', fontWeight: 700, marginBottom: 4 } }, '✅ الكود صحيح'),
              h('div', { style: { color: '#4A4870', lineHeight: 2 } },
                'الكود: ', h('b', { style: { color: '#A78BFA' } }, res.c.code), ' · ',
                'الحالة: ', h('b', { style: { color: res.c.is_active ? '#10B981' : '#EF4444' } }, res.c.is_active ? 'نشط ✅' : 'موقوف ⛔'), ' · ',
                'الخطة: ', res.c.plan, ' · ',
                'الاستخدام: ', res.c.use_count || 0, ' مرة · ',
                'الجهاز: ', res.c.device_id ? 'مُقيَّد' : 'مفتوح', ' · ',
                'ينتهي: ', dFmt(res.c.expires_at)
              )
            )
      )
    ),
    h('div', { className: 'card' },
      h('div', { className: 'ch' }, 'ℹ️ معلومات'),
      [['رابط التطبيق', APP], ['الإصدار', 'CraftCost Pro v3.1'], ['الشركة', 'AdVax']].map(function(item, i) {
        return h('div', { key: i, style: { display: 'flex', justifyContent: 'space-between', fontSize: 12, padding: '6px 10px', background: '#0A091A', borderRadius: 7, marginBottom: 5 } },
          h('span', { style: { color: '#3E3C6A' } }, item[0]), h('span', { style: { fontWeight: 600 } }, item[1])
        );
      })
    )
  );
}

/* ════════════════════════════════════════════
   ROOT APP
════════════════════════════════════════════ */
function App() {
  var as = St(function() { try { var s = sessionStorage.getItem('cc-adm'); return s ? JSON.parse(s) : null; } catch(e) { return null; } });
  var auth = as[0]; var setAuth = as[1];
  var ts = St('codes'); var tab = ts[0]; var setTab = ts[1];
  var tv = useToast();

  function onLogin(r) { var s = { token: r.token, email: r.email }; sessionStorage.setItem('cc-adm', JSON.stringify(s)); setAuth(s); }
  function logout() { sessionStorage.removeItem('cc-adm'); setAuth(null); }

  if (!auth) return h(Fr, null, h(Login, { onLogin: onLogin }), h(Toast, { t: tv.toast }));

  var TABS = [
    { id: 'codes', i: '🔑', l: 'الأكواد' },
    { id: 'users', i: '👥', l: 'المستخدمون' },
    { id: 'notifs', i: '📢', l: 'الإشعارات' },
    { id: 'settings', i: '⚙️', l: 'الإعدادات' }
  ];

  return h(Fr, null,
    h('div', { id: 'bar' },
      h('div', { className: 'bar-logo' }, '🔐'),
      h('div', { style: { flex: 1 } },
        h('div', { className: 'bar-name' }, 'لوحة إدارة AdVax — CraftCost Pro'),
        h('div', { className: 'bar-email' }, auth.email)
      ),
      APP && h('a', { href: APP, target: '_blank', className: 'b b-o', style: { textDecoration: 'none', padding: '5px 11px', fontSize: 12, marginLeft: 5 } }, 'التطبيق ↗'),
      h('button', { className: 'b b-r', style: { padding: '5px 11px', fontSize: 12 }, onClick: logout }, 'خروج')
    ),
    h('div', { id: 'wrap' },
      h('div', { className: 'tabs' },
        TABS.map(function(t) {
          return h('button', { key: t.id, className: 'tab' + (tab === t.id ? ' on' : ''), onClick: function() { setTab(t.id); } }, t.i, ' ', t.l);
        })
      ),
      tab === 'codes'    && h(CodesPage,    { key: 'codes',    tok: auth.token, show: tv.show }),
      tab === 'users'    && h(UsersPage,    { key: 'users',    tok: auth.token, show: tv.show }),
      tab === 'notifs'   && h(NotifsPage,   { key: 'notifs',   show: tv.show }),
      tab === 'settings' && h(SettingsPage, { key: 'settings', tok: auth.token, show: tv.show, email: auth.email })
    ),
    h(Toast, { t: tv.toast })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
</script>
</body>
</html>

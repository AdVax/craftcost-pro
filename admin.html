<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<title>لوحة إدارة AdVax</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;direction:rtl;background:#08080F;color:#E4E4F0;min-height:100vh}
input,select,textarea,button{font-family:'Cairo',sans-serif}
input,select,textarea{background:#0E0E1C;border:1.5px solid #272750;color:#E4E4F0;padding:10px 14px;border-radius:10px;width:100%;outline:none;transition:border-color .2s;direction:rtl;font-size:15px}
input:focus,select:focus,textarea:focus{border-color:#9D60FF;box-shadow:0 0 0 3px rgba(124,58,237,.1)}
select option{background:#181830}
button{cursor:pointer;user-select:none;border:none;font-family:'Cairo',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#272750;border-radius:4px}
.top{background:#0E0E1C;border-bottom:1.5px solid #1C1C3A;padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.wrap{max-width:940px;margin:0 auto;padding:22px 16px}
.lp{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.lb{background:#111124;border:1.5px solid #272750;border-radius:24px;padding:36px;width:100%;max-width:390px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;font-size:13px;font-weight:700;transition:all .2s;white-space:nowrap;cursor:pointer}
.bp{background:linear-gradient(135deg,#7C3AED,#9D60FF);color:#fff;box-shadow:0 2px 10px rgba(124,58,237,.3)}
.bp:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(124,58,237,.45)}
.bp:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.bo{background:transparent;border:1.5px solid #272750;color:#E4E4F0}
.bo:hover{border-color:#9D60FF;color:#9D60FF}
.br{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);color:#EF4444}
.br:hover{background:rgba(239,68,68,.2)}
.bg2{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.28);color:#10B981}
.bw{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.28);color:#F59E0B}
.bsm{padding:5px 11px;font-size:12px;border-radius:7px}
.sec{background:#111124;border:1.5px solid #1C1C3A;border-radius:14px;padding:20px;margin-bottom:16px}
.lbl{display:block;margin-bottom:5px;font-size:12px;font-weight:700;color:#7878A8}
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.bok{background:rgba(16,185,129,.12);color:#10B981}
.berr{background:rgba(239,68,68,.12);color:#EF4444}
.bwrn{background:rgba(245,158,11,.12);color:#F59E0B}
.bpur{background:rgba(124,58,237,.12);color:#9D60FF}
.bmut{background:rgba(255,255,255,.07);color:#7878A8}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr}}
.tw{overflow-x:auto;border-radius:12px;border:1.5px solid #1C1C3A}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 12px;text-align:right;color:#7878A8;font-weight:700;border-bottom:1.5px solid #1C1C3A;background:#181830}
td{padding:10px 12px;border-bottom:1px solid #1C1C3A;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.tabs{display:flex;gap:7px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:9px 16px;border-radius:9px;font-size:13px;font-weight:700;color:#7878A8;background:#181830;border:1.5px solid #1C1C3A;transition:all .2s;cursor:pointer}
.tab.on{background:rgba(124,58,237,.12);color:#9D60FF;border-color:rgba(124,58,237,.28)}
.sc{background:#111124;border:1.5px solid #1C1C3A;border-radius:13px;padding:16px}
.ibox{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-radius:10px;padding:11px 14px;font-size:12px;margin-bottom:12px;color:#9D60FF;display:flex;gap:8px;line-height:1.6}
.wbox{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:12px;color:#F59E0B;line-height:1.6}
.ebox{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:11px 14px;font-size:13px;color:#EF4444}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:11px;font-weight:800;font-size:13px;z-index:9999;box-shadow:0 8px 28px rgba(0,0,0,.5);white-space:nowrap;color:#fff;animation:fu .3s}
@keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.fu{animation:fu .3s}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script>
'use strict';
var _useState=React.useState,_useEffect=React.useEffect,_useCallback=React.useCallback,_Fragment=React.Fragment;
function h(t,p){var args=Array.prototype.slice.call(arguments);return React.createElement.apply(React,args)}

/* CONFIG */
var PASS='advax2025';
var SUPA_URL='https://jqkmtqbhxsuvvumudgrj.supabase.co';
var SUPA_KEY='sb_publishable_0KbQ1aL7rWoJCkk84OUVKQ_Krc4nvwS';
var APP_URL='https://advax.github.io/craftcost-pro';
var GH_OWNER='Advax';
var GH_REPO='craftcost-notification';
var GH_FILE='latest.json';
var GH_API='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE;

/* Supabase helpers */
function hdrs(){return{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};}
function supaGet(t,q){
  return fetch(SUPA_URL+'/rest/v1/'+t+'?'+(q||''),{headers:hdrs()})
    .then(function(r){return r.ok?r.json():null}).catch(function(){return null});
}
function supaPost(t,body){
  return fetch(SUPA_URL+'/rest/v1/'+t,{
    method:'POST',
    headers:Object.assign({},hdrs(),{'Content-Type':'application/json','Prefer':'return=representation'}),
    body:JSON.stringify(body)
  }).then(function(r){return r.ok?r.json():null}).catch(function(){return null});
}
function supaPatch(t,q,body){
  return fetch(SUPA_URL+'/rest/v1/'+t+'?'+q,{
    method:'PATCH',
    headers:Object.assign({},hdrs(),{'Content-Type':'application/json','Prefer':'return=minimal'}),
    body:JSON.stringify(body)
  }).then(function(r){return r.ok;}).catch(function(){return false;});
}
function supaDel(t,q){
  return fetch(SUPA_URL+'/rest/v1/'+t+'?'+q,{method:'DELETE',headers:hdrs()})
    .then(function(r){return r.ok;}).catch(function(){return false;});
}

/* GitHub notification */
function ghGetSha(token){
  return fetch(GH_API,{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}})
    .then(function(r){
      if(r.status===404)return null;
      if(!r.ok)return 'ERR';
      return r.json().then(function(d){return d.sha||null;});
    }).catch(function(){return 'ERR';});
}
function ghSend(token,title,body){
  if(!token)return Promise.resolve({ok:false,msg:'أدخل GitHub Token أولاً'});
  if(!title.trim())return Promise.resolve({ok:false,msg:'العنوان مطلوب'});
  var notif={id:'n_'+Date.now(),title:title.trim(),body:body.trim(),sentAt:new Date().toISOString()};
  var content=btoa(unescape(encodeURIComponent(JSON.stringify(notif,null,2))));
  return ghGetSha(token).then(function(sha){
    if(sha==='ERR')return{ok:false,msg:'خطأ في الاتصال بـ GitHub — تحقق من الـ Token'};
    var payload={message:'إشعار: '+title.trim(),content:content};
    if(sha)payload.sha=sha;
    return fetch(GH_API,{
      method:'PUT',
      headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify(payload)
    }).then(function(r){
      if(r.ok)return{ok:true,notif:notif};
      return r.json().then(function(e){return{ok:false,msg:e.message||'GitHub Error '+r.status};});
    }).catch(function(){return{ok:false,msg:'خطأ في الشبكة'};});
  });
}

/* Utils */
function uid(){return Math.random().toString(36).slice(2,9);}
function today(){return new Date().toISOString().slice(0,10);}
function fmtD(d){return d?new Date(d).toLocaleDateString('ar-SA'):'—';}
function dLeft(d){return Math.ceil((new Date(d)-new Date())/864e5);}
function genCode(){var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:8},function(){return c[Math.floor(Math.random()*c.length)];}).join('');}
function expDate(months){var d=new Date();d.setMonth(d.getMonth()+months);return d.toISOString();}
function expDateLabel(months){var d=new Date();d.setMonth(d.getMonth()+months);return d.toLocaleDateString('ar-SA');}

function useLS(k,d0){
  var s=_useState(function(){try{var x=localStorage.getItem(k);return x?JSON.parse(x):d0;}catch(e){return d0;}});
  var v=s[0],sv=s[1];
  _useEffect(function(){localStorage.setItem(k,JSON.stringify(v));},[v,k]);
  return[v,sv];
}

/* Toast */
function useToast(){
  var s=_useState(null);var t=s[0],st=s[1];
  var show=_useCallback(function(msg,type){
    st({msg:msg,type:type||'ok'});
    setTimeout(function(){st(null);},3200);
  },[]);
  return{t:t,show:show};
}
function Toast(props){
  if(!props.t)return null;
  var C={ok:'#10B981',err:'#EF4444',warn:'#F59E0B',info:'#3B82F6'};
  return h('div',{className:'toast',style:{background:C[props.t.type]||C.ok}},props.t.msg);
}

/* Login */
function Login(props){
  var ps=_useState('');var pass=ps[0],setPass=ps[1];
  var es=_useState('');var err=es[0],setErr=es[1];
  function submit(){
    if(pass===PASS){sessionStorage.setItem('cc-adm','1');props.onLogin();}
    else{setErr('كلمة السر غير صحيحة');setPass('');}
  }
  return h('div',{className:'lp'},
    h('div',{className:'lb'},
      h('div',{style:{width:68,height:68,borderRadius:18,background:'linear-gradient(135deg,#7C3AED,#9D60FF)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:32,margin:'0 auto 16px'}},'🔐'),
      h('h1',{style:{fontSize:22,fontWeight:900,marginBottom:4}},'لوحة إدارة AdVax'),
      h('p',{style:{fontSize:13,color:'#7878A8',marginBottom:26}},'CraftCost Pro — المسؤولون فقط'),
      h('div',{style:{textAlign:'right',marginBottom:err?0:14}},
        h('label',{className:'lbl'},'كلمة السر'),
        h('input',{type:'password',value:pass,onChange:function(e){setPass(e.target.value);},onKeyDown:function(e){if(e.key==='Enter')submit();},placeholder:'••••••••'})
      ),
      err&&h('div',{className:'ebox',style:{margin:'10px 0'}},err),
      h('button',{className:'btn bp',style:{width:'100%',justifyContent:'center',padding:'13px',marginTop:6},onClick:submit,disabled:!pass},'دخول ←')
    )
  );
}

/* StatsBar */
function StatsBar(props){
  var codes=props.codes;
  var active=codes.filter(function(c){return c.is_active&&new Date(c.expires_at)>new Date();}).length;
  var expired=codes.filter(function(c){return new Date(c.expires_at)<new Date();}).length;
  var soon=codes.filter(function(c){return c.is_active&&dLeft(c.expires_at)<=7&&dLeft(c.expires_at)>0;}).length;
  var stopped=codes.filter(function(c){return !c.is_active&&new Date(c.expires_at)>new Date();}).length;
  var stats=[
    {ic:'🔑',l:'إجمالي الأكواد',v:codes.length,c:'#9D60FF'},
    {ic:'✅',l:'نشط',v:active,c:'#10B981'},
    {ic:'⏰',l:'ينتهي قريباً',v:soon,c:'#F59E0B'},
    {ic:'❌',l:'منتهي/موقوف',v:expired+stopped,c:'#EF4444'},
  ];
  return h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}},
    h('div',{className:'g4',style:{flex:1}},
      stats.map(function(s,i){
        return h('div',{key:i,className:'sc'},
          h('div',{style:{fontSize:20,marginBottom:7}},s.ic),
          h('div',{style:{fontSize:22,fontWeight:900,color:s.c,marginBottom:2}},s.v),
          h('div',{style:{fontSize:12,color:'#7878A8'}},s.l)
        );
      })
    ),
    h('button',{className:'btn bo bsm',onClick:props.onRefresh,disabled:props.loading},props.loading?'جاري..':'🔄 تحديث')
  );
}

/* CodeMgr */
var PLANS=[
  {v:'monthly',l:'شهري',m:1},
  {v:'quarterly',l:'ربع سنوي',m:3},
  {v:'biannual',l:'نصف سنوي',m:6},
  {v:'yearly',l:'سنوي',m:12},
];

function CodeMgr(props){
  var codes=props.codes,setCodes=props.setCodes,showToast=props.showToast;
  var ns=_useState({code:'',label:'',note:'',plan:'monthly',months:1});var nc=ns[0],setNc=ns[1];
  var fs=_useState('all');var filter=fs[0],setF=fs[1];
  var ls=_useState(false);var loading=ls[0],setL=ls[1];

  function addCode(){
    if(!nc.code.trim())return;
    setL(true);
    var row={code:nc.code.toUpperCase(),label:nc.label,note:nc.note,plan:nc.plan,
      expires_at:expDate(nc.months),is_active:true,device_id:'',use_count:0};
    supaPost('subscription_codes',row).then(function(res){
      if(res&&res[0]){
        setCodes(function(p){return[res[0]].concat(p);});
        showToast('✅ تم إنشاء الكود في Supabase');
        setNc({code:'',label:'',note:'',plan:'monthly',months:1});
      }else{
        row.id=uid();row.created_at=new Date().toISOString();row.last_used_at=null;row.device_info='';
        setCodes(function(p){return[row].concat(p);});
        showToast('⚠️ حُفظ محلياً — Supabase غير متاح','warn');
      }
      setL(false);
    });
  }

  function toggle(id,cur){
    supaPatch('subscription_codes','id=eq.'+id,{is_active:!cur}).then(function(){
      setCodes(function(p){return p.map(function(c){return c.id===id?Object.assign({},c,{is_active:!cur}):c;});});
      showToast(cur?'⛔ تم الإيقاف':'✅ تم التفعيل',cur?'warn':'ok');
    });
  }

  function resetDev(id){
    supaPatch('subscription_codes','id=eq.'+id,{device_id:'',device_info:''}).then(function(){
      setCodes(function(p){return p.map(function(c){return c.id===id?Object.assign({},c,{device_id:'',device_info:''}):c;});});
      showToast('✅ تم إعادة تعيين الجهاز');
    });
  }

  function extend(id,months){
    var c=codes.find(function(x){return x.id===id;});if(!c)return;
    var base=new Date(c.expires_at)>new Date()?new Date(c.expires_at):new Date();
    base.setMonth(base.getMonth()+months);
    var iso=base.toISOString();
    supaPatch('subscription_codes','id=eq.'+id,{expires_at:iso,is_active:true}).then(function(){
      setCodes(function(p){return p.map(function(x){return x.id===id?Object.assign({},x,{expires_at:iso,is_active:true}):x;});});
      showToast('✅ تم التمديد '+months+' شهر');
    });
  }

  function delCode(id){
    if(!window.confirm('حذف هذا الكود نهائياً؟'))return;
    supaDel('subscription_codes','id=eq.'+id).then(function(){
      setCodes(function(p){return p.filter(function(c){return c.id!==id;});});
      showToast('تم الحذف','err');
    });
  }

  function copy(code){navigator.clipboard&&navigator.clipboard.writeText(code).then(function(){showToast('✅ تم النسخ');});}

  var list=codes.filter(function(c){
    if(filter==='active') return c.is_active&&new Date(c.expires_at)>new Date();
    if(filter==='expired')return new Date(c.expires_at)<new Date();
    if(filter==='stopped')return !c.is_active;
    if(filter==='soon')   return c.is_active&&dLeft(c.expires_at)<=7&&dLeft(c.expires_at)>0;
    return true;
  });

  return h('div',null,
    h('div',{className:'sec'},
      h('h3',{style:{fontSize:15,fontWeight:800,marginBottom:12,color:'#9D60FF'}},'➕ إنشاء كود اشتراك'),
      h('div',{className:'g3',style:{marginBottom:12}},
        h('div',null,
          h('label',{className:'lbl'},'الكود'),
          h('div',{style:{display:'flex',gap:7}},
            h('input',{value:nc.code,onChange:function(e){setNc(function(p){return Object.assign({},p,{code:e.target.value.toUpperCase()});});},
              placeholder:'CRAFT2025',style:{letterSpacing:2,fontWeight:700,fontSize:14}}),
            h('button',{className:'btn bo bsm',onClick:function(){setNc(function(p){return Object.assign({},p,{code:genCode()});});},style:{flexShrink:0}},'🔀')
          )
        ),
        h('div',null,
          h('label',{className:'lbl'},'التسمية / اسم العميل'),
          h('input',{value:nc.label,onChange:function(e){setNc(function(p){return Object.assign({},p,{label:e.target.value});});},placeholder:'مثال: محمد أحمد'})
        ),
        h('div',null,
          h('label',{className:'lbl'},'ملاحظة داخلية'),
          h('input',{value:nc.note,onChange:function(e){setNc(function(p){return Object.assign({},p,{note:e.target.value});});},placeholder:'لك أنت فقط...'})
        )
      ),
      h('div',{style:{marginBottom:14}},
        h('label',{className:'lbl'},'مدة الاشتراك'),
        h('div',{style:{display:'flex',gap:7,flexWrap:'wrap'}},
          PLANS.map(function(p){
            return h('button',{key:p.v,onClick:function(){setNc(function(x){return Object.assign({},x,{plan:p.v,months:p.m});});},
              className:'btn bsm '+(nc.plan===p.v?'bp':'bo')},p.l,' (',p.m,' شهر)');
          })
        )
      ),
      nc.code&&h('div',{style:{background:'rgba(124,58,237,.1)',border:'1px solid rgba(124,58,237,.25)',borderRadius:9,padding:'8px 14px',marginBottom:12,fontSize:13,color:'#9D60FF'}},
        '📅 ينتهي في: ',h('b',null,expDateLabel(nc.months))
      ),
      h('button',{className:'btn bp',onClick:addCode,disabled:!nc.code.trim()||loading},loading?'جاري..':'✅ إنشاء الكود')
    ),

    h('div',{className:'sec'},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:10}},
        h('h3',{style:{fontSize:15,fontWeight:800}},'🔑 الأكواد (',codes.length,')'),
        h('div',{style:{display:'flex',gap:5,flexWrap:'wrap'}},
          [['all','الكل'],['active','نشط'],['expired','منتهي'],['soon','ينتهي قريباً'],['stopped','موقوف']].map(function(item){
            return h('button',{key:item[0],onClick:function(){setF(item[0]);},className:'btn bsm '+(filter===item[0]?'bp':'bo')},item[1]);
          })
        )
      ),
      list.length===0
        ?h('p',{style:{color:'#4C4C7A',textAlign:'center',padding:'22px 0',fontSize:13}},'لا توجد أكواد')
        :h('div',{className:'tw'},h('table',null,
            h('thead',null,h('tr',null,
              h('th',null,'الكود'),h('th',null,'العميل'),h('th',null,'الخطة'),
              h('th',null,'ينتهي'),h('th',null,'الجهاز'),h('th',null,'الاستخدام'),h('th',null,'الحالة'),h('th',null,'إجراءات')
            )),
            h('tbody',null,list.map(function(c){
              var exp=new Date(c.expires_at)<new Date();
              var dl=dLeft(c.expires_at);
              var hasDevice=!!(c.device_id&&c.device_id.length>3);
              var status=!c.is_active?'موقوف':exp?'منتهي':dl<=7?'ينتهي قريباً':'نشط';
              var bc=!c.is_active?'bwrn':exp?'berr':dl<=7?'bwrn':'bok';
              return h('tr',{key:c.id},
                h('td',null,
                  h('div',{style:{display:'flex',alignItems:'center',gap:6}},
                    h('b',{style:{fontFamily:'monospace',fontSize:13,letterSpacing:2,color:'#9D60FF'}},c.code),
                    h('button',{onClick:function(){copy(c.code);},style:{background:'none',color:'#7878A8',fontSize:11,padding:'2px 6px',borderRadius:5,border:'1px solid #272750',cursor:'pointer'}},'📋')
                  )
                ),
                h('td',null,
                  h('div',null,
                    h('div',{style:{fontWeight:600}},c.label||h('span',{style:{color:'#4C4C7A'}},'—')),
                    c.note&&h('div',{style:{fontSize:11,color:'#4C4C7A'}},c.note)
                  )
                ),
                h('td',null,h('span',{className:'bdg bpur',style:{fontSize:10}},c.plan||'—')),
                h('td',null,
                  h('div',{style:{fontSize:12,color:exp?'#EF4444':dl<=7?'#F59E0B':'#10B981',fontWeight:600}},fmtD(c.expires_at)),

                  h('div',{style:{display:'flex',gap:4,flexWrap:'wrap'}},

/* Notifications */
function Notifs(props){
  var showToast=props.showToast;
  var ts=_useState('');var title=ts[0],setTitle=ts[1];
  var bs=_useState('');var body=bs[0],setBody=bs[1];
  var tks=_useState(function(){return localStorage.getItem('cc-gh-token')||'';});var token=tks[0],setToken=tks[1];
  var tis=_useState('');var tokenInput=tis[0],setTI=tis[1];
  var shs=_useState(false);var showTok=shs[0],setShowTok=shs[1];
  var sds=_useState(false);var sending=sds[0],setSending=sds[1];
  var lg=useLS('cc-notif-log',[]);var log=lg[0],setLog=lg[1];

  function saveToken(){
    var t=tokenInput.trim();if(!t)return;
    localStorage.setItem('cc-gh-token',t);setToken(t);setTI('');setShowTok(false);
    showToast('✅ تم حفظ الـ Token في متصفحك فقط');
  }
  function removeToken(){localStorage.removeItem('cc-gh-token');setToken('');showToast('تم حذف الـ Token','warn');}

  function send(){
    if(!title.trim()){showToast('اكتب عنوان الإشعار','warn');return;}
    if(!token){showToast('أدخل GitHub Token أولاً','err');return;}
    setSending(true);
    ghSend(token,title,body).then(function(res){
      setSending(false);
      if(res.ok){
        var entry=Object.assign({},res.notif,{loggedAt:new Date().toISOString()});
        setLog(function(p){return[entry].concat(p.slice(0,49));});
        showToast('✅ تم الإرسال! يصل للعملاء خلال ساعة');
        setTitle('');setBody('');
      }else{
        showToast('❌ '+res.msg,'err');
      }
    });
  }

  var masked=token?token.slice(0,8)+'•••••••••••'+token.slice(-4):'';

  return h('div',null,
    h('div',{className:'sec',style:{background:token?'rgba(16,185,129,.07)':'rgba(245,158,11,.07)',borderColor:token?'rgba(16,185,129,.25)':'rgba(245,158,11,.25)'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
        h('h3',{style:{fontSize:15,fontWeight:800}},'🔑 GitHub Token'),
        token?h('span',{className:'bdg bok'},'✓ مُعيَّن'):h('span',{className:'bdg bwrn'},'⚠️ مطلوب')
      ),
      token?h('div',null,
        h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:8}},
          h('div',{style:{flex:1,background:'#181830',borderRadius:8,padding:'8px 12px',fontFamily:'monospace',fontSize:13,color:'#10B981'}},'🔒 ',masked),
          h('button',{className:'btn br bsm',onClick:removeToken},'حذف')
        ),
        h('p',{style:{fontSize:11,color:'#7878A8'}},'✓ محفوظ في متصفحك فقط')
      ):h('div',null,
        h('div',{className:'wbox'},'💡 أنشئ Fine-grained token بصلاحية Contents: Read & Write على مستودع craftcost-notification فقط'),
        h('div',{style:{display:'flex',gap:8,marginBottom:6}},
          h('input',{type:showTok?'text':'password',value:tokenInput,onChange:function(e){setTI(e.target.value);},
            onKeyDown:function(e){if(e.key==='Enter')saveToken();},placeholder:'github_pat_...',style:{flex:1,fontFamily:'monospace'}}),
          h('button',{onClick:function(){setShowTok(!showTok);},className:'btn bo bsm'},showTok?'🙈':'👁'),
          h('button',{onClick:saveToken,className:'btn bp bsm',disabled:!tokenInput.trim()},'حفظ')
        ),
        h('p',{style:{fontSize:11,color:'#4C4C7A'}},'الـ Token يُحفظ في متصفحك فقط ولا يُرسل لأي خادم')
      )
    ),

    h('div',{className:'sec'},
      h('h3',{style:{fontSize:15,fontWeight:800,marginBottom:8}},'📢 إرسال إشعار للعملاء'),
      h('div',{className:'ibox'},'📡 ','يُكتب الإشعار على GitHub ← يصل للعملاء خلال ساعة — مجاني بالكامل'),
      h('div',{style:{marginBottom:10}},
        h('label',{className:'lbl'},'عنوان الإشعار *'),
        h('input',{value:title,onChange:function(e){setTitle(e.target.value);},placeholder:'مثال: تحديث جديد ✨',maxLength:100})
      ),
      h('div',{style:{marginBottom:14}},
        h('label',{className:'lbl'},'تفاصيل (اختياري)'),
        h('textarea',{value:body,onChange:function(e){setBody(e.target.value);},rows:3,placeholder:'تفاصيل...',maxLength:300})
      ),
      title&&h('div',{style:{background:'rgba(124,58,237,.12)',border:'1.5px solid rgba(124,58,237,.28)',borderRadius:12,padding:'12px 14px',marginBottom:14}},
        h('div',{style:{fontSize:11,color:'#7878A8',marginBottom:6,fontWeight:700}},'معاينة:'),
        h('div',{style:{display:'flex',gap:8}},
          h('span',{style:{fontSize:20}},'📢'),
          h('div',null,
            h('div',{style:{fontSize:14,fontWeight:800,color:'#fff',marginBottom:2}},title),
            body&&h('div',{style:{fontSize:12,color:'rgba(255,255,255,.8)'}},body)
          )
        )
      ),
      h('button',{className:'btn bp',style:{width:'100%',justifyContent:'center',padding:'12px'},onClick:send,disabled:!title.trim()||!token||sending},
        sending?'جاري الإرسال..':'📨 إرسال لجميع العملاء')
    ),

    log.length>0&&h('div',{className:'sec'},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
        h('h3',{style:{fontSize:15,fontWeight:800}},'📋 الإشعارات المُرسلة (',log.length,')'),
        h('button',{className:'btn br bsm',onClick:function(){if(window.confirm('مسح السجل؟'))setLog([]);}},'مسح')
      ),
      h('div',{className:'tw'},h('table',null,
        h('thead',null,h('tr',null,h('th',null,'العنوان'),h('th',null,'التفاصيل'),h('th',null,'وقت الإرسال'))),
        h('tbody',null,log.map(function(n){
          return h('tr',{key:n.id},
            h('td',null,h('b',null,n.title)),
            h('td',null,h('span',{style:{fontSize:12,color:'#7878A8'}},n.body||'—')),
            h('td',null,h('span',{style:{fontSize:12}},fmtD(n.sentAt||n.loggedAt)))
          );
        }))
      ))
    )
  );
}

/* Admin Settings */
function AdminSettings(props){
  var showToast=props.showToast;
  var tcs=_useState('');var testCode=tcs[0],setTC=tcs[1];
  var trs=_useState(null);var testRes=trs[0],setTR=trs[1];
  var tgs=_useState(false);var testing=tgs[0],setTG=tgs[1];

  function runTest(){
    if(!testCode.trim())return;
    setTG(true);setTR(null);
    supaGet('subscription_codes','code=eq.'+encodeURIComponent(testCode.toUpperCase())+'&select=*').then(function(d){
      setTG(false);
      if(!d||!d.length){setTR({err:true,msg:'الكود غير موجود'});}
      else{var r=d[0];setTR({err:false,code:r.code,expires:r.expires_at,active:r.is_active,plan:r.plan,uses:r.use_count,device:r.device_id?'مُقيَّد بجهاز':'بدون جهاز'});}
    });
  }

  return h('div',null,
    h('div',{className:'sec'},
      h('h3',{style:{fontSize:15,fontWeight:800,marginBottom:12}},'🔌 حالة الاتصال'),
      h('div',{className:'g2'},
        h('div',{style:{background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.25)',borderRadius:10,padding:'12px 14px'}},
          h('div',{style:{fontWeight:700,marginBottom:3,color:'#10B981'}},'✅ Supabase متصل'),
          h('div',{style:{fontSize:11,color:'#7878A8'}},'قاعدة البيانات السحابية')
        ),
        h('div',{style:{background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.25)',borderRadius:10,padding:'12px 14px'}},
          h('div',{style:{fontWeight:700,marginBottom:3,color:'#10B981'}},'✅ GitHub Notifications'),
          h('div',{style:{fontSize:11,color:'#7878A8'}},'نظام الإشعارات عبر GitHub')
        )
      )
    ),
    h('div',{className:'sec'},
      h('h3',{style:{fontSize:15,fontWeight:800,marginBottom:12}},'🧪 اختبار كود'),
      h('div',{style:{display:'flex',gap:9,marginBottom:10}},
        h('input',{value:testCode,onChange:function(e){setTC(e.target.value.toUpperCase());},placeholder:'أدخل كود للاختبار...',style:{flex:1,letterSpacing:2,fontWeight:700}}),
        h('button',{className:'btn bp',onClick:runTest,disabled:testing||!testCode.trim(),style:{flexShrink:0}},testing?'..':'اختبار')
      ),
      testRes&&h('div',{style:{background:testRes.err?'rgba(239,68,68,.1)':'rgba(16,185,129,.1)',border:'1px solid '+(testRes.err?'rgba(239,68,68,.25)':'rgba(16,185,129,.25)'),borderRadius:9,padding:'10px 14px',fontSize:13,color:testRes.err?'#EF4444':'#10B981'}},
        testRes.err?('❌ '+testRes.msg):h('div',null,
          h('div',null,'✅ الكود صحيح'),
          h('div',{style:{marginTop:5,fontSize:12,color:'#7878A8'}},
            'الخطة: ',testRes.plan,' · ينتهي: ',fmtD(testRes.expires),
            ' · الاستخدام: ',testRes.uses||0,' مرة · الجهاز: ',testRes.device,
            ' · الحالة: ',h('b',{style:{color:testRes.active?'#10B981':'#EF4444'}},testRes.active?'نشط':'موقوف')
          )
        )
      )
    ),
    h('div',{className:'sec'},
      h('h3',{style:{fontSize:15,fontWeight:800,marginBottom:12}},'ℹ️ معلومات'),
      [['رابط التطبيق',APP_URL],['الإصدار','CraftCost Pro v3.1'],['الشركة','AdVax']].map(function(item,i){
        return h('div',{key:i,style:{display:'flex',justifyContent:'space-between',fontSize:13,padding:'7px 11px',background:'#181830',borderRadius:8,marginBottom:6}},
          h('span',{style:{color:'#7878A8'}},item[0]),h('b',null,item[1]));
      })
    )
  );
}

/* Main App */
function AdminApp(){
  var as=_useState(function(){return sessionStorage.getItem('cc-adm')==='1';});var auth=as[0],setAuth=as[1];
  var ts=_useState('codes');var tab=ts[0],setTab=ts[1];
  var cs=useLS('cc-adm-codes',[]);var codes=cs[0],setCodes=cs[1];
  var ls=_useState(false);var loading=ls[0],setL=ls[1];
  var toast=useToast();

  function logout(){sessionStorage.removeItem('cc-adm');setAuth(false);}

  function refresh(){
    setL(true);
    supaGet('subscription_codes','select=*&order=created_at.desc').then(function(data){
      if(data){setCodes(data);toast.show('✅ تم تحميل '+data.length+' كود');}
      else{toast.show('❌ خطأ في التحميل','err');}
      setL(false);
    });
  }

  _useEffect(function(){if(auth)refresh();},[auth]);

  if(!auth)return React.createElement(_Fragment,null,
    React.createElement(Login,{onLogin:function(){setAuth(true);}}),
    React.createElement(Toast,{t:toast.t})
  );

  var active=codes.filter(function(c){return c.is_active&&new Date(c.expires_at)>new Date();}).length;
  var tabs=[
    {id:'codes',  ic:'🔑',l:'الأكواد'},
    {id:'users',  ic:'👥',l:'المستخدمون'},
    {id:'notifs', ic:'📢',l:'الإشعارات'},
    {id:'settings',ic:'⚙️',l:'إعدادات'},
  ];

  return React.createElement(_Fragment,null,
    h('div',{className:'top'},
      h('div',{style:{width:38,height:38,borderRadius:10,background:'linear-gradient(135deg,#7C3AED,#9D60FF)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}},'🔐'),
      h('div',{style:{flex:1}},
        h('div',{style:{fontWeight:900,fontSize:16,color:'#9D60FF'}},'لوحة إدارة AdVax — CraftCost Pro'),
        h('div',{style:{fontSize:12,color:'#7878A8'}},active,' اشتراك نشط')
      ),
      APP_URL&&h('a',{href:APP_URL,target:'_blank',className:'btn bo bsm',style:{textDecoration:'none',marginLeft:6}},'فتح التطبيق ↗'),
      h('button',{className:'btn br bsm',onClick:logout},'خروج')
    ),
    h('div',{className:'wrap fu'},
      h(StatsBar,{codes:codes,onRefresh:refresh,loading:loading}),
      h('div',{className:'tabs'},
        tabs.map(function(tb){
          return h('button',{key:tb.id,onClick:function(){setTab(tb.id);},className:'tab'+(tab===tb.id?' on':'')},tb.ic,' ',tb.l);
        })
      ),
      tab==='codes'   &&h(CodeMgr,{codes:codes,setCodes:setCodes,showToast:toast.show}),
      tab==='users'   &&h(Users,{codes:codes}),
      tab==='notifs'  &&h(Notifs,{showToast:toast.show}),
      tab==='settings'&&h(AdminSettings,{showToast:toast.show})
    ),
    h(Toast,{t:toast.t})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(AdminApp,null)
);
</script>

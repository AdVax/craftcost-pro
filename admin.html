<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<title>لوحة إدارة AdVax — CraftCost Pro</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;direction:rtl;background:#07060F;color:#E2E0F0;min-height:100vh}
input,select,textarea,button{font-family:'Cairo',sans-serif}
input,select,textarea{
  background:#100F20;border:1.5px solid #252345;color:#E2E0F0;
  padding:9px 13px;border-radius:9px;width:100%;outline:none;
  transition:border-color .15s;direction:rtl;font-size:14px;
}
input:focus,select:focus,textarea:focus{border-color:#7C3AED;box-shadow:0 0 0 2px rgba(124,58,237,.15)}
input[type=email]{direction:ltr;text-align:right}
select option{background:#181730}
button{cursor:pointer;border:none;font-family:'Cairo',sans-serif;transition:opacity .15s,transform .1s}
button:active{transform:scale(.96)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#252345;border-radius:3px}

/* ── Layout ── */
#bar{
  background:#0C0B1C;border-bottom:1px solid #1A1835;
  padding:12px 20px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:99;
}
#bar .logo{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#7C3AED,#A78BFA);
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
#bar .title{font-weight:900;font-size:15px;color:#A78BFA;line-height:1.2}
#bar .sub{font-size:11px;color:#4A4870;margin-top:1px}
#wrap{max-width:980px;margin:0 auto;padding:20px 14px 60px}

/* ── Tabs ── */
.tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:8px 15px;border-radius:8px;font-size:13px;font-weight:700;
     color:#4A4870;background:#100F20;border:1px solid #1A1835;cursor:pointer}
.tab.on{background:rgba(124,58,237,.18);color:#A78BFA;border-color:rgba(124,58,237,.35)}

/* ── Cards ── */
.card{background:#100F20;border:1px solid #1A1835;border-radius:12px;padding:16px;margin-bottom:14px}
.card-h{font-size:14px;font-weight:800;color:#C4B5FD;margin-bottom:14px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;
     border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed}
.b-p{background:linear-gradient(135deg,#7C3AED,#A78BFA);color:#fff}
.b-o{background:transparent;border:1px solid #252345;color:#C0BDDF}
.b-o:hover{border-color:#7C3AED;color:#A78BFA}
.b-r{background:rgba(239,68,68,.13);border:1px solid rgba(239,68,68,.3);color:#EF4444}
.b-g{background:rgba(16,185,129,.13);border:1px solid rgba(16,185,129,.3);color:#10B981}
.b-y{background:rgba(245,158,11,.13);border:1px solid rgba(245,158,11,.3);color:#F59E0B}
.b-lg{padding:11px 22px;font-size:14px;border-radius:10px}

/* ── Grid ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:600px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* ── Stat box ── */
.sbox{background:#100F20;border:1px solid #1A1835;border-radius:10px;padding:13px}
.snum{font-size:26px;font-weight:900;line-height:1}
.slbl{font-size:11px;color:#4A4870;margin-top:4px}

/* ── Table ── */
.tw{overflow-x:auto;border-radius:10px;border:1px solid #1A1835}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:680px}
th{padding:9px 11px;text-align:right;color:#4A4870;font-weight:700;
   background:#0C0B1C;border-bottom:1px solid #1A1835;white-space:nowrap}
td{padding:9px 11px;border-bottom:1px solid #130F25;vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:rgba(124,58,237,.04)}
tr.dim td{opacity:.45}

/* ── Badges ── */
.bg{display:inline-flex;align-items:center;gap:3px;
    padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.bg-g{background:rgba(16,185,129,.12);color:#10B981;border:1px solid rgba(16,185,129,.2)}
.bg-r{background:rgba(239,68,68,.12); color:#EF4444;border:1px solid rgba(239,68,68,.2)}
.bg-y{background:rgba(245,158,11,.12);color:#F59E0B;border:1px solid rgba(245,158,11,.2)}
.bg-p{background:rgba(124,58,237,.12);color:#A78BFA;border:1px solid rgba(124,58,237,.2)}
.bg-d{background:rgba(255,255,255,.05);color:#4A4870;border:1px solid rgba(255,255,255,.07)}

/* ── Form ── */
.lbl{display:block;margin-bottom:5px;font-size:11px;font-weight:700;color:#4A4870;text-transform:uppercase;letter-spacing:.5px}

/* ── Toast ── */
.toast{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  padding:10px 20px;border-radius:10px;font-weight:700;font-size:13px;
  z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.7);
  white-space:nowrap;color:#fff;pointer-events:none;
  animation:tin .2s ease-out;
}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Login ── */
.lp{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(ellipse 70% 60% at 50% 20%,rgba(124,58,237,.1),transparent)}
.lc{background:#100F20;border:1px solid #252345;border-radius:20px;
    padding:32px 26px;width:100%;max-width:370px;text-align:center}
.li{width:60px;height:60px;border-radius:16px;
    background:linear-gradient(135deg,#7C3AED,#A78BFA);
    display:flex;align-items:center;justify-content:center;
    font-size:28px;margin:0 auto 14px}

/* ── Loading overlay ── */
.loading-row td{text-align:center;padding:24px;color:#4A4870}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script>
'use strict';

/* ══════════════════════════════════════
   CONFIG
══════════════════════════════════════ */
var SUPA = 'https://jqkmtqbhxsuvvumudgrj.supabase.co';
var AKEY = 'sb_publishable_0KbQ1aL7rWoJCkk84OUVKQ_Krc4nvwS';
var APP  = 'https://craftcost-pro.advax.workers.dev';
var GH_API = 'https://api.github.com/repos/Advax/craftcost-notification/contents/latest.json';

/* ══════════════════════════════════════
   REACT ALIASES
══════════════════════════════════════ */
var h  = React.createElement;
var St = React.useState;
var Ef = React.useEffect;
var Cb = React.useCallback;
var Fr = React.Fragment;

/* ══════════════════════════════════════
   SUPABASE AUTH
══════════════════════════════════════ */
function signIn(email, password) {
  return fetch(SUPA + '/auth/v1/token?grant_type=password', {
    method: 'POST',
    headers: { 'apikey': AKEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email.trim(), password: password })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.access_token) return { ok: true, token: d.access_token, email: d.user.email };
    return { ok: false, err: d.error_description || d.msg || 'بريد أو كلمة مرور خاطئة' };
  })
  .catch(function() { return { ok: false, err: 'خطأ في الاتصال بالإنترنت' }; });
}

/* ══════════════════════════════════════
   SUPABASE DB — ONE FUNCTION PER ACTION
   Each returns: null on fail | data on success
══════════════════════════════════════ */
function hdrs(token) {
  return {
    'apikey': AKEY,
    'Authorization': 'Bearer ' + (token || AKEY),
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };
}

/* Get all codes ordered by created_at */
function apiGetCodes(token) {
  return fetch(SUPA + '/rest/v1/subscription_codes?select=*&order=created_at.desc', {
    headers: hdrs(token)
  })
  .then(function(r) {
    if (!r.ok) { console.error('GET codes failed:', r.status); return null; }
    return r.json();
  })
  .catch(function(e) { console.error('GET codes error:', e); return null; });
}

/* Insert new code */
function apiInsert(token, row) {
  return fetch(SUPA + '/rest/v1/subscription_codes', {
    method: 'POST',
    headers: hdrs(token),
    body: JSON.stringify(row)
  })
  .then(function(r) {
    if (!r.ok) {
      return r.text().then(function(t) {
        console.error('INSERT failed:', r.status, t);
        return null;
      });
    }
    return r.json();
  })
  .catch(function(e) { console.error('INSERT error:', e); return null; });
}

/* Toggle is_active for one code */
function apiToggle(token, id, newValue) {
  return fetch(SUPA + '/rest/v1/subscription_codes?id=eq.' + id, {
    method: 'PATCH',
    headers: hdrs(token),
    body: JSON.stringify({ is_active: newValue })
  })
  .then(function(r) {
    if (!r.ok) {
      return r.text().then(function(t) {
        console.error('TOGGLE failed:', r.status, t);
        return null;
      });
    }
    return r.json(); // returns [{...updated row...}]
  })
  .catch(function(e) { console.error('TOGGLE error:', e); return null; });
}

/* Patch any fields */
function apiPatch(token, id, fields) {
  return fetch(SUPA + '/rest/v1/subscription_codes?id=eq.' + id, {
    method: 'PATCH',
    headers: hdrs(token),
    body: JSON.stringify(fields)
  })
  .then(function(r) {
    if (!r.ok) {
      return r.text().then(function(t) {
        console.error('PATCH failed:', r.status, t);
        return null;
      });
    }
    return r.json();
  })
  .catch(function(e) { console.error('PATCH error:', e); return null; });
}

/* Delete one code */
function apiDelete(token, id) {
  return fetch(SUPA + '/rest/v1/subscription_codes?id=eq.' + id, {
    method: 'DELETE',
    headers: hdrs(token)
  })
  .then(function(r) {
    if (!r.ok) {
      return r.text().then(function(t) {
        console.error('DELETE failed:', r.status, t);
        return false;
      });
    }
    return true;
  })
  .catch(function(e) { console.error('DELETE error:', e); return false; });
}

/* ══════════════════════════════════════
   GITHUB NOTIFICATIONS
══════════════════════════════════════ */
function ghGetSha(ghToken) {
  return fetch(GH_API, {
    headers: { 'Authorization': 'token ' + ghToken, 'Accept': 'application/vnd.github.v3+json' }
  })
  .then(function(r) {
    if (r.status === 404) return null;
    if (!r.ok) return 'ERR';
    return r.json().then(function(d) { return d.sha || null; });
  })
  .catch(function() { return 'ERR'; });
}

function ghSend(ghToken, title, body) {
  var notif = { id: 'n_' + Date.now(), title: title.trim(), body: body.trim(), sentAt: new Date().toISOString() };
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(notif, null, 2))));
  return ghGetSha(ghToken).then(function(sha) {
    if (sha === 'ERR') return { ok: false, msg: 'خطأ في GitHub Token — تحقق منه' };
    var payload = { message: 'إشعار: ' + title, content: content };
    if (sha) payload.sha = sha;
    return fetch(GH_API, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + ghToken, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(function(r) {
      if (r.ok) return { ok: true, notif: notif };
      return r.json().then(function(e) { return { ok: false, msg: e.message || 'GitHub Error ' + r.status }; });
    })
    .catch(function() { return { ok: false, msg: 'خطأ في الشبكة' }; });
  });
}

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
function uid() { return Math.random().toString(36).slice(2, 9); }
function dFmt(d) { return d ? new Date(d).toLocaleDateString('ar-SA') : '—'; }
function dLeft(d) { return Math.ceil((new Date(d) - new Date()) / 864e5); }
function expDate(m) { var d = new Date(); d.setMonth(d.getMonth() + m); return d.toISOString(); }
function expLabel(m) { var d = new Date(); d.setMonth(d.getMonth() + m); return d.toLocaleDateString('ar-SA'); }
function genCode() {
  var c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var out = '';
  for (var i = 0; i < 8; i++) out += c[Math.floor(Math.random() * c.length)];
  return out;
}

/* ══════════════════════════════════════
   TOAST — simple global
══════════════════════════════════════ */
function useToast() {
  var s = St(null);
  var toast = s[0]; var setToast = s[1];
  var timer = { v: null };
  var show = Cb(function(msg, type) {
    if (timer.v) clearTimeout(timer.v);
    setToast({ msg: msg, type: type || 'ok', key: Date.now() });
    timer.v = setTimeout(function() { setToast(null); }, 3200);
  }, []);
  return { toast: toast, show: show };
}
function Toast(p) {
  if (!p.t) return null;
  var C = { ok: '#10B981', err: '#EF4444', warn: '#F59E0B', info: '#6366F1' };
  return h('div', { className: 'toast', key: p.t.key, style: { background: C[p.t.type] || C.ok } }, p.t.msg);
}

/* ══════════════════════════════════════
   LOGIN
══════════════════════════════════════ */
function Login(p) {
  var es = St(''); var email = es[0]; var setEmail = es[1];
  var ps = St(''); var pass = ps[0]; var setPass = ps[1];
  var ls = St(false); var loading = ls[0]; var setLoading = ls[1];
  var ms = St(''); var msg = ms[0]; var setMsg = ms[1];
  var ss = St(false); var showP = ss[0]; var setShowP = ss[1];

  function submit() {
    if (!email.trim() || !pass) { setMsg('أدخل البريد الإلكتروني وكلمة المرور'); return; }
    setLoading(true); setMsg('');
    signIn(email, pass).then(function(res) {
      setLoading(false);
      if (res.ok) p.onLogin(res);
      else setMsg(res.err);
    });
  }

  return h('div', { className: 'lp' },
    h('div', { className: 'lc' },
      h('div', { className: 'li' }, '🔐'),
      h('div', { style: { fontSize: 20, fontWeight: 900, marginBottom: 4 } }, 'لوحة إدارة AdVax'),
      h('div', { style: { fontSize: 12, color: '#4A4870', marginBottom: 8 } }, 'CraftCost Pro'),
      h('div', { style: {
        background: 'rgba(16,185,129,.08)', border: '1px solid rgba(16,185,129,.18)',
        borderRadius: 8, padding: '6px 12px', fontSize: 11, color: '#10B981', marginBottom: 24
      } }, '🔒 مؤمّنة بـ Supabase Authentication'),

      h('div', { style: { textAlign: 'right', marginBottom: 10 } },
        h('label', { className: 'lbl' }, 'البريد الإلكتروني'),
        h('input', {
          type: 'email', value: email, placeholder: 'admin@advax.com',
          onChange: function(e) { setEmail(e.target.value); },
          onKeyDown: function(e) { if (e.key === 'Enter') submit(); }
        })
      ),
      h('div', { style: { textAlign: 'right', marginBottom: 14 } },
        h('label', { className: 'lbl' }, 'كلمة المرور'),
        h('div', { style: { position: 'relative' } },
          h('input', {
            type: showP ? 'text' : 'password', value: pass, placeholder: '••••••••',
            style: { paddingLeft: 40 },
            onChange: function(e) { setPass(e.target.value); },
            onKeyDown: function(e) { if (e.key === 'Enter') submit(); }
          }),
          h('button', {
            onClick: function() { setShowP(!showP); },
            style: { position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', background: 'none', color: '#4A4870', padding: '2px 5px', fontSize: 15 }
          }, showP ? '🙈' : '👁')
        )
      ),
      msg && h('div', { style: {
        background: 'rgba(239,68,68,.1)', border: '1px solid rgba(239,68,68,.22)',
        borderRadius: 8, padding: '8px 12px', fontSize: 12, color: '#EF4444', marginBottom: 10
      } }, msg),
      h('button', {
        className: 'btn b-p b-lg', style: { width: '100%', justifyContent: 'center' },
        onClick: submit, disabled: loading || !email.trim() || !pass
      }, loading ? '⏳ جاري التحقق...' : 'دخول ←')
    )
  );
}

/* ══════════════════════════════════════
   CODES PAGE
   Logic: every action → call Supabase → reload list
   No optimistic updates. No ops state. Simple.
══════════════════════════════════════ */
var PLANS = [
  { v: 'monthly',   l: 'شهري',       m: 1  },
  { v: 'quarterly', l: 'ربع سنوي',  m: 3  },
  { v: 'biannual',  l: 'نصف سنوي',  m: 6  },
  { v: 'yearly',    l: 'سنوي',       m: 12 }
];

function CodesPage(p) {
  var token = p.token; var show = p.show;

  /* State */
  var cs = St([]); var codes = cs[0]; var setCodes = cs[1];
  var ls = St(true); var loading = ls[0]; var setLoading = ls[1];
  var fs = St('all'); var filter = fs[0]; var setFilter = fs[1];
  var ws = St(null); var working = ws[0]; var setWorking = ws[1]; // which row is busy
  var as = St(false); var adding = as[0]; var setAdding = as[1];

  /* Form */
  var ns = St({ code: '', label: '', note: '', plan: 'monthly', months: 1 });
  var nc = ns[0]; var setNc = ns[1];

  /* ── Load all codes from Supabase ── */
  function load(silent) {
    if (!silent) setLoading(true);
    apiGetCodes(token).then(function(data) {
      setLoading(false);
      if (data) setCodes(data);
      else show('❌ فشل تحميل الأكواد من Supabase', 'err');
    });
  }

  Ef(function() { load(false); }, []);

  /* ── Add new code ── */
  function doAdd() {
    var code = nc.code.trim().toUpperCase();
    if (!code) { show('أدخل الكود', 'warn'); return; }
    if (codes.find(function(c) { return c.code === code; })) {
      show('❌ الكود ' + code + ' موجود مسبقاً', 'err'); return;
    }
    setAdding(true);
    var row = {
      code: code, label: nc.label.trim(), note: nc.note.trim(),
      plan: nc.plan, expires_at: expDate(nc.months),
      is_active: true, device_id: '', device_info: '', use_count: 0
    };
    apiInsert(token, row).then(function(res) {
      setAdding(false);
      if (res && (Array.isArray(res) ? res.length > 0 : res.id)) {
        show('✅ تم إنشاء الكود: ' + code);
        setNc({ code: '', label: '', note: '', plan: 'monthly', months: 1 });
        load(true); // reload list silently
      } else {
        show('❌ فشل إنشاء الكود — شغّل supabase-fix-policies.sql', 'err');
      }
    });
  }

  /* ── Toggle active/inactive ──
     THE KEY FIX: update codes state directly from the returned row,
     no full reload needed, no ops state confusion */
  function doToggle(id, currentActive) {
    var newVal = !currentActive;
    setWorking(id);
    apiToggle(token, id, newVal).then(function(res) {
      setWorking(null);
      if (res && Array.isArray(res) && res.length > 0) {
        /* Supabase returned the updated row — update it directly in state */
        var updated = res[0];
        setCodes(function(prev) {
          return prev.map(function(c) { return c.id === id ? updated : c; });
        });
        show(newVal ? '✅ تم تفعيل الكود' : '⛔ تم إيقاف الكود', newVal ? 'ok' : 'warn');
      } else {
        show('❌ فشل — شغّل supabase-fix-policies.sql في Supabase', 'err');
      }
    });
  }

  /* ── Delete ── */
  function doDelete(id, code) {
    if (!window.confirm('حذف الكود ' + code + '؟\nلا يمكن التراجع.')) return;
    setWorking(id);
    apiDelete(token, id).then(function(ok) {
      setWorking(null);
      if (ok) {
        setCodes(function(prev) { return prev.filter(function(c) { return c.id !== id; }); });
        show('🗑 تم حذف ' + code, 'err');
      } else {
        show('❌ فشل الحذف — تأكد من الـ policies في Supabase', 'err');
      }
    });
  }

  /* ── Reset device ── */
  function doResetDevice(id, code) {
    if (!window.confirm('إعادة تعيين الجهاز للكود ' + code + '؟')) return;
    setWorking(id);
    apiPatch(token, id, { device_id: '', device_info: '' }).then(function(res) {
      setWorking(null);
      if (res && Array.isArray(res) && res.length > 0) {
        var updated = res[0];
        setCodes(function(prev) { return prev.map(function(c) { return c.id === id ? updated : c; }); });
        show('✅ تم إعادة تعيين الجهاز');
      } else {
        show('❌ فشل التحديث', 'err');
      }
    });
  }

  /* ── Extend ── */
  function doExtend(id, code, months) {
    var c = codes.find(function(x) { return x.id === id; });
    if (!c) return;
    var base = new Date(c.expires_at) > new Date() ? new Date(c.expires_at) : new Date();
    base.setMonth(base.getMonth() + months);
    var iso = base.toISOString();
    setWorking(id);
    apiPatch(token, id, { expires_at: iso, is_active: true }).then(function(res) {

    if (filter === 'stopped') return !c.is_active;

    if (!tc.trim()) return;
    setTG(true); setTR(null);
    fetch(SUPA + '/rest/v1/subscription_codes?code=eq.' + encodeURIComponent(tc.toUpperCase()) + '&select=*', {
      headers: hdrs(token)
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      setTG(false);
      if (!d || !d.length) setTR({ err: true, msg: 'الكود غير موجود في قاعدة البيانات' });
      else setTR({ err: false, c: d[0] });
    })
    .catch(function() { setTG(false); setTR({ err: true, msg: 'خطأ في الاتصال' }); });
  }

  return h('div', null,
    h('div', { className: 'card', style: { borderColor: 'rgba(16,185,129,.2)', background: 'rgba(16,185,129,.04)' } },
      h('div', { className: 'card-h' }, '👤 حسابك'),
      h('div', { style: { display: 'flex', alignItems: 'center', gap: 12 } },
        h('div', { style: { width: 44, height: 44, borderRadius: 12, background: 'linear-gradient(135deg,#7C3AED,#A78BFA)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 } }, '👤'),
        h('div', null,
          h('div', { style: { fontWeight: 700, fontSize: 14 } }, email),
          h('div', { style: { fontSize: 11, color: '#10B981', marginTop: 2 } }, '✅ مُوثَّق عبر Supabase Auth')
        )
      )
    ),
    h('div', { className: 'card' },
      h('div', { className: 'card-h' }, '🧪 اختبار كود'),
      h('div', { style: { display: 'flex', gap: 8, marginBottom: 10 } },
        h('input', {
          value: tc,
          onChange: function(e) { setTC(e.target.value.toUpperCase()); },
          onKeyDown: function(e) { if (e.key === 'Enter') runTest(); },
          placeholder: 'أدخل كود للاختبار...',
          style: { flex: 1, letterSpacing: 2, fontWeight: 700 }
        }),
        h('button', {
          className: 'btn b-p', style: { flexShrink: 0 },
          disabled: tg || !tc.trim(), onClick: runTest
        }, tg ? '⏳' : 'اختبار')
      ),
      tr && h('div', { style: {
        background: tr.err ? 'rgba(239,68,68,.08)' : 'rgba(16,185,129,.08)',
        border: '1px solid ' + (tr.err ? 'rgba(239,68,68,.22)' : 'rgba(16,185,129,.22)'),
        borderRadius: 9, padding: '10px 14px', fontSize: 12
      } },
        tr.err
          ? h('span', { style: { color: '#EF4444' } }, '❌ ', tr.msg)
          : h('div', null,
              h('div', { style: { color: '#10B981', fontWeight: 700, marginBottom: 5 } }, '✅ الكود موجود وصحيح'),
              h('div', { style: { color: '#5A5880', lineHeight: 1.9 } },
                'الكود: ', h('b', { style: { color: '#A78BFA' } }, tr.c.code), ' · ',
                'الخطة: ', tr.c.plan, ' · ',
                'الحالة: ', h('b', { style: { color: tr.c.is_active ? '#10B981' : '#EF4444' } }, tr.c.is_active ? 'نشط ✅' : 'موقوف ⛔'), ' · ',
                'الاستخدام: ', tr.c.use_count || 0, ' مرة · ',
                'الجهاز: ', h('b', null, tr.c.device_id ? 'مُقيَّد' : 'مفتوح'), ' · ',
                'ينتهي: ', dFmt(tr.c.expires_at)
              )
            )
      )
    ),
    h('div', { className: 'card' },
      h('div', { className: 'card-h' }, 'ℹ️ معلومات'),
      [
        ['رابط التطبيق', APP],
        ['الإصدار', 'CraftCost Pro v3.1'],
        ['الشركة', 'AdVax']
      ].map(function(item, i) {
        return h('div', { key: i, style: { display: 'flex', justifyContent: 'space-between', fontSize: 12, padding: '7px 10px', background: '#0C0B1C', borderRadius: 8, marginBottom: 6 } },
          h('span', { style: { color: '#4A4870' } }, item[0]),
          h('span', { style: { fontWeight: 600 } }, item[1])
        );
      })
    )
  );
}

/* ══════════════════════════════════════
   ROOT APP
══════════════════════════════════════ */
function App() {
  var as = St(function() {
    try { var s = sessionStorage.getItem('cc-adm-s'); return s ? JSON.parse(s) : null; }
    catch(e) { return null; }
  });
  var auth = as[0]; var setAuth = as[1];
  var ts = St('codes'); var tab = ts[0]; var setTab = ts[1];
  var tv = useToast();

  function onLogin(res) {
    var sess = { token: res.token, email: res.email };
    sessionStorage.setItem('cc-adm-s', JSON.stringify(sess));
    setAuth(sess);
  }
  function logout() { sessionStorage.removeItem('cc-adm-s'); setAuth(null); }

  if (!auth) return h(Fr, null, h(Login, { onLogin: onLogin }), h(Toast, { t: tv.toast }));

  var TABS = [
    { id: 'codes',    icon: '🔑', label: 'الأكواد'     },
    { id: 'users',    icon: '👥', label: 'المستخدمون'  },
    { id: 'notifs',   icon: '📢', label: 'الإشعارات'   },
    { id: 'settings', icon: '⚙️', label: 'الإعدادات'   }
  ];

  return h(Fr, null,
    /* Top bar */
    h('div', { id: 'bar' },
      h('div', { className: 'logo' }, '🔐'),
      h('div', { style: { flex: 1 } },
        h('div', { className: 'title' }, 'لوحة إدارة AdVax — CraftCost Pro'),
        h('div', { className: 'sub' }, auth.email)
      ),
      APP && h('a', { href: APP, target: '_blank', className: 'btn b-o', style: { textDecoration: 'none', padding: '6px 12px', fontSize: 12, marginLeft: 6 } }, 'التطبيق ↗'),
      h('button', { className: 'btn b-r', style: { padding: '6px 12px', fontSize: 12 }, onClick: logout }, 'خروج')
    ),
    /* Page */
    h('div', { id: 'wrap' },
      h('div', { className: 'tabs' },
        TABS.map(function(t) {
          return h('button', {
            key: t.id,
            className: 'tab' + (tab === t.id ? ' on' : ''),
            onClick: function() { setTab(t.id); }
          }, t.icon, ' ', t.label);
        })
      ),
      tab === 'codes'    && h(CodesPage,    { key: 'codes',    token: auth.token, show: tv.show }),
      tab === 'users'    && h(UsersPage,    { key: 'users',    token: auth.token, show: tv.show }),
      tab === 'notifs'   && h(NotifsPage,   { key: 'notifs',   show: tv.show }),
      tab === 'settings' && h(SettingsPage, { key: 'settings', token: auth.token, show: tv.show, email: auth.email })
    ),
    h(Toast, { t: tv.toast })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
</script>
</body>
</html>
